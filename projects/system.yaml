apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: system
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: >-
    Cluster plumbing + shared services. AppSet domains:
    networking, security, storage, observability, ci-cd.
    Cluster-scoped resources allowed (most components ship CRDs).
  sourceRepos:
    - https://github.com/urosevicvuk/ykube
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
