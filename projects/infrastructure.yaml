apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: |
    Shared backing services: Vault (secrets), Harbor (registry), Forgejo (SCM),
    Argo Workflows + Argo Events. Several install CRDs; whitelist is permissive
    for now and should be tightened once each component's CRD set is pinned down.
  sourceRepos:
    - https://github.com/urosevicvuk/ykube
  destinations:
    - namespace: vault
      server: https://kubernetes.default.svc
    - namespace: harbor
      server: https://kubernetes.default.svc
    - namespace: forgejo
      server: https://kubernetes.default.svc
    - namespace: argo-workflows
      server: https://kubernetes.default.svc
    - namespace: argo-events
      server: https://kubernetes.default.svc
  # TODO: tighten to specific CRD groups once components are configured
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
