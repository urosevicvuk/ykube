apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: |
    Cluster plumbing: ArgoCD self-management, Cilium (CNI + Gateway API + L2),
    cert-manager, External Secrets Operator, external-dns, gateway resources,
    kube-prometheus-stack, loki, promtail, cloudflared, cloudnative-pg.
    Allowed cluster-scoped resources because most platform components ship CRDs.
  sourceRepos:
    - https://github.com/urosevicvuk/ykube
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
