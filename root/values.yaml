# ArgoCD self-management values.
# Single-replica everywhere — k3s/firelink is a single-node cluster. When the
# Talos+Proxmox target lands, flip replicas to 2-3 and enable redis-ha.

crds:
  install: true
  keep: true

global:
  domain: argocd.urosevicvuk.dev

controller:
  replicas: 1

server:
  replicas: 1
  # Gateway terminates TLS; Argo speaks HTTP behind it. --insecure here means
  # "don't run TLS at the server level" — not "skip cert validation". Without
  # this, the Gateway gets a TLS-over-TLS situation.
  extraArgs:
    - --insecure

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

# Notifications controller → ntfy. Independent of Dex/SSO — it just watches
# Application status and POSTs to ntfy's in-cluster JSON publish endpoint
# (anonymous read-write inside the tailnet, so no token needed). Subscriptions
# below are cluster-wide defaults, so every Application is covered without
# per-app annotations. Dynamic strings go through `toJson` so an error message
# containing quotes/newlines can't produce invalid JSON.
notifications:
  enabled: true
  notifiers:
    service.webhook.ntfy: |
      url: http://ntfy.ntfy.svc.cluster.local
      headers:
        - name: Content-Type
          value: application/json
  templates:
    template.app-sync-failed: |
      webhook:
        ntfy:
          method: POST
          path: /
          body: |
            {
              "topic": "argocd",
              "title": {{ (printf "ArgoCD sync failed: %s" .app.metadata.name) | toJson }},
              "message": {{ .app.status.operationState.message | default "sync failed" | toJson }},
              "priority": 4,
              "tags": ["rotating_light"],
              "click": {{ (printf "https://argocd.urosevicvuk.dev/applications/%s" .app.metadata.name) | toJson }}
            }
    template.app-health-degraded: |
      webhook:
        ntfy:
          method: POST
          path: /
          body: |
            {
              "topic": "argocd",
              "title": {{ (printf "ArgoCD degraded: %s" .app.metadata.name) | toJson }},
              "message": {{ .app.status.health.message | default "health is Degraded" | toJson }},
              "priority": 4,
              "tags": ["warning"],
              "click": {{ (printf "https://argocd.urosevicvuk.dev/applications/%s" .app.metadata.name) | toJson }}
            }
  triggers:
    trigger.on-sync-failed: |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [app-health-degraded]
  # Cluster-wide default: subscribe every Application to both triggers.
  subscriptions:
    - recipients:
        - ntfy
      triggers:
        - on-sync-failed
        - on-health-degraded

# Disabled until SSO is actually configured — enabling Dex without config
# leaves a dormant pod + a login button that 500s. (Authentik will replace
# the need for Dex entirely.)
dex:
  enabled: false

redis:
  enabled: true

redis-ha:
  enabled: false

configs:
  cm:
    create: true
    # Required so kustomizations using `helmCharts:` render correctly across the repo.
    # LoadRestrictionsNone allows the root/ kustomization to reference ../projects/*
    # and ../appsets/* — by default kustomize forbids cross-directory resource refs.
    kustomize.buildOptions: "--enable-helm --load-restrictor=LoadRestrictionsNone"
    application.resourceTrackingMethod: annotation

    # Global compare options — applied to every Application's diff.
    resource.compareoptions: |
      ignoreResourceStatusField: all
      ignoreAggregatedRoles: true

    # Storage controller fills volumeName + volumeMode after binding.
    resource.customizations.ignoreDifferences.PersistentVolumeClaim: |
      jsonPointers:
        - /spec/volumeName
        - /spec/volumeMode

    # StatefulSet volumeClaimTemplates: API server expands the embedded
    # PVC to a full resource (apiVersion/kind/status/volumeMode) on read.
    resource.customizations.ignoreDifferences.apps_StatefulSet: |
      jsonPointers:
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
        - /spec/volumeClaimTemplates/0/status
        - /spec/volumeClaimTemplates/0/spec/volumeMode
        - /spec/volumeClaimTemplates/0/metadata/annotations

    # Secrets owned by Cilium / ESO — they legitimately re-write content.
    resource.customizations.ignoreDifferences.Secret: |
      managedFieldsManagers:
        - cilium-operator
        - external-secrets
  params:
    server.insecure: "true"
  # Admin password is materialized into the `argocd-initial-admin-secret`
  # Secret by ESO (see apps/system/foundation/external-secrets/argocd-admin.yaml).
  # The Helm chart's bcrypt path requires `configs.secret.argocdServerAdminPassword`
  # but ESO writes the Secret directly, so we leave Helm's secret unset and let
  # ESO populate it after first sync. Until then the default ArgoCD random
  # password applies (recoverable via `argocd-initial-admin-secret`).
  repositories: {}
