apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# root/ is the app-of-apps source: it renders the argo-cd chart (self-managed)
# plus all AppProjects and ApplicationSets. The root Application points here, so
# argocd takes itself over from the TF stage 05 seed install on first reconcile.
namespace: argocd

resources:
  - namespace.yaml
  - httproute.yaml
  - argocd-webhook-secret.yaml
  - ../projects/system.yaml
  - ../projects/homelab.yaml
  - ../projects/morel.yaml
  - ../projects/eko-servis.yaml
  - ../projects/ofnir.yaml
  - ../projects/raf.yaml
  - ../appsets/system.yaml
  - ../appsets/homelab.yaml
  - ../appsets/morel.yaml
  - ../appsets/eko-servis.yaml
  - ../appsets/ofnir.yaml
  - ../appsets/raf.yaml
  - ../appsets/raf-external.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 10.1.0  # renovate: depName=argo/argo-cd
    releaseName: argocd
    namespace: argocd
    valuesFile: values.yaml
    includeCRDs: true
