# Creates + owns `argocd-secret` so argocd-server's /api/webhook endpoint
# can verify GitHub's X-Hub-Signature-256 against `webhook.github.secret`.
#
# creationPolicy: Owner — ESO is the sole creator of this Secret. The argo-cd
# chart's own `argocd-secret` template is disabled in root/values.yaml
# (`configs.secret.createSecret: false`) because the chart rendered an
# empty Secret that, if ever deleted, couldn't be recreated by a Merge-
# policy ExternalSecret (chicken-egg deadlock).
#
# argocd-server writes its session signing key + TLS cert into the same
# Secret on startup; SSA field ownership keeps that separate from ESO's
# `webhook.github.secret` field. The argocd-cm rule
# `managedFieldsManagers: [external-secrets]` silences the resulting
# Secret-label drift.
#
# Vault path to populate (one secret, both repos reuse it — the GitHub
# webhook config on each repo must use the same value):
#     vault kv put kv/argocd/webhook github-secret=<random-32+ chars>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-github-webhook
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: webhook.github.secret
      remoteRef:
        key: argocd/webhook
        property: github-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
