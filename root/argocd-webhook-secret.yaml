# Creates + owns `argocd-secret`. ESO is the sole owner because the chart's
# own template was rendering an empty Secret that, if ever deleted, would
# deadlock a Merge-policy ExternalSecret. With `createSecret: false` in
# root/values.yaml, ESO drives the whole Secret lifecycle.
#
# ESO `creationPolicy: Owner` truncates the Secret's data to whatever this
# CR declares — so ALL fields argocd-server expects MUST be listed below.
# argocd-server v3 errors with "server.secretkey is missing" if not present
# (it no longer auto-generates).
#
# Fields:
#   server.secretkey         session signing key, used to HMAC-sign JWTs
#                            for the UI/API. NEVER ROTATE: rotating
#                            invalidates every logged-in user's session
#                            AND every existing token. Treat as forever.
#   webhook.github.secret    GitHub webhook signing secret. The same
#                            value goes into the GitHub repo's Webhook
#                            settings; argocd-server verifies the
#                            X-Hub-Signature-256 header against it.
#
# Generate + populate Vault (one-time bootstrap):
#     vault kv put kv/argocd/secretkey  key="$(openssl rand -base64 32)"
#     vault kv put kv/argocd/webhook    github-secret="$(openssl rand -hex 32)"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  # Keep the historical name — renaming would trigger an Argo prune-and-recreate
  # dance and a brief window with no owner of argocd-secret. The CR-name and
  # target-Secret-name don't have to match.
  name: argocd-github-webhook
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: server.secretkey
      remoteRef:
        key: argocd/secretkey
        property: key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: webhook.github.secret
      remoteRef:
        key: argocd/webhook
        property: github-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
