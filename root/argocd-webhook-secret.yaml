# Injects the GitHub webhook signing secret into the chart-managed
# `argocd-secret` so argocd-server's /api/webhook endpoint will accept
# pushes from GitHub (verifies X-Hub-Signature-256 against this value).
#
# creationPolicy: Merge — the argo-cd Helm chart already creates and owns
# `argocd-secret`; we only need to add a single key (`webhook.github.secret`)
# without taking ownership of the whole Secret. ESO re-applies the key on
# its refresh interval, so a chart upgrade that briefly wipes it is
# self-healing within ~5m.
#
# Vault path to populate (one secret, both repos reuse it — the GitHub
# webhook config on each repo must use the same value):
#     vault kv put kv/argocd/webhook github-secret=<random-32+ chars>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-github-webhook
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: webhook.github.secret
      remoteRef:
        key: argocd/webhook
        property: github-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
