apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/urosevicvuk/ykube
    targetRevision: main
    path: root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  # Per-app drift suppression. The chart renders argocd-secret with an empty
  # data block; argocd-server populates admin.password + server.secretkey on
  # startup; ESO Merges in webhook.github.secret + stamps its tracking
  # annotations. None of those writes are ours — ignore the contested fields
  # so the root app stays Synced.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      namespace: argocd
      jsonPointers:
        - /data
        - /metadata/labels/reconcile.external-secrets.io~1managed
        - /metadata/annotations/reconcile.external-secrets.io~1data-hash
        - /metadata/annotations/force-sync
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # argocd Namespace is created by the seed install in TF stage 05.
      - ServerSideApply=true
