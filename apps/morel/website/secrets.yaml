# All ExternalSecrets for morel. Sync wave -10 — materialize before the
# Deployment (wave 0) tries to mount them.
#
# Manual step after Harbor is up:
#   1. Log into Harbor, create project `morel`.
#   2. Push the morel image: docker push registry.urosevicvuk.dev/morel/website:v1.1.1
#   3. Harbor → Project → Robot Accounts → New robot, scope: pull on `morel/*`.
#   4. Write the docker config to Vault:
#        vault kv put kv/morel/registry-creds \
#          .dockerconfigjson=@/tmp/dockerconfig.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: morel-smtp-creds
  namespace: morel
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: morel-smtp-creds
    creationPolicy: Owner
  data:
    - secretKey: smtp-user
      remoteRef:
        key: morel/smtp-creds
        property: smtp-user
    - secretKey: smtp-pass
      remoteRef:
        key: morel/smtp-creds
        property: smtp-pass
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
  namespace: morel
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: morel/registry-creds
        property: .dockerconfigjson
