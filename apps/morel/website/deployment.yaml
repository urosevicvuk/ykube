apiVersion: apps/v1
kind: Deployment
metadata:
  name: morel
  namespace: morel
  labels:
    app.kubernetes.io/name: morel
spec:
  replicas: 1
  # SQLite file on a RWO PVC — pod restart needs the old pod gone first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: morel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: morel
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: morel
          image: registry.urosevicvuk.dev/morel/website:v1.1.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DB_PATH
              value: /data/morel.db
            - name: SMTP_HOST
              value: smtp.gmail.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_FROM
              value: noreply@morel.rs
            - name: NOTIFY_TO
              value: office.moreldoo@gmail.com
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: morel-smtp-creds
                  key: smtp-user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: morel-smtp-creds
                  key: smtp-pass
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: morel-data
---
apiVersion: v1
kind: Service
metadata:
  name: morel
  namespace: morel
  labels:
    app.kubernetes.io/name: morel
spec:
  selector:
    app.kubernetes.io/name: morel
  ports:
    - name: http
      port: 8080
      targetPort: http
