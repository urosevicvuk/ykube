apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: morel
  namespace: morel
spec:
  parentRefs:
    - name: gateway-external
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - morel.rs
    - www.morel.rs
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: morel
          port: 8080
          group: ""
          kind: Service
          weight: 1
