apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: morel

resources:
  - namespace.yaml
  # Tenant guardrails disabled while we stabilize.
  # - resource-quota.yaml
  # - limit-range.yaml
  # - network-policy.yaml
  - pvcs.yaml
  - secrets.yaml
  - deployment.yaml
  - httproute.yaml

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: morel
      app.kubernetes.io/managed-by: argocd
