# Admin credentials + Django secret key for the Ofnir Paperless instance.
# Populate in Vault: kv/paperless-ofnir/admin: { username, password, email, secret-key }
# Separate path from the personal homelab instance so business/personal data
# never share secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-admin
  namespace: ofnir-paperless-ngx
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: paperless-admin
    creationPolicy: Owner
  data:
    - secretKey: PAPERLESS_ADMIN_USER
      remoteRef:
        key: paperless-ofnir/admin
        property: username
    - secretKey: PAPERLESS_ADMIN_PASSWORD
      remoteRef:
        key: paperless-ofnir/admin
        property: password
    - secretKey: PAPERLESS_ADMIN_MAIL
      remoteRef:
        key: paperless-ofnir/admin
        property: email
    - secretKey: PAPERLESS_SECRET_KEY
      remoteRef:
        key: paperless-ofnir/admin
        property: secret-key
