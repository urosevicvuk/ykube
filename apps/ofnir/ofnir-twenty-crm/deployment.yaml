# Twenty server (web + GraphQL API + DB migrations on boot). Env vars and
# volume mounts mirror Twenty's canonical k8s manifest at
# https://github.com/twentyhq/twenty/blob/main/packages/twenty-docker/k8s/manifests/deployment-server.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-server
  namespace: twenty-crm
  labels:
    app.kubernetes.io/name: twenty-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: twenty-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: twenty-server
    spec:
      automountServiceAccountToken: false
      containers:
        - name: twenty-server
          image: docker.io/twentycrm/twenty:v2.14.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_PORT
              value: "3000"
            - name: SERVER_URL
              value: https://crm.ofnir.dev
            - name: PG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: twenty-pg-app
                  key: uri
            - name: REDIS_URL
              value: redis://twenty-redis:6379
            - name: STORAGE_TYPE
              value: local
            - name: SIGN_IN_PREFILLED
              value: "false"
            - name: ACCESS_TOKEN_EXPIRES_IN
              value: "7d"
            - name: LOGIN_TOKEN_EXPIRES_IN
              value: "1h"
          envFrom:
            # Provides APP_SECRET. (v2 also accepts ENCRYPTION_KEY; APP_SECRET
            # is what Twenty's canonical k8s manifest uses and still works.)
            - secretRef:
                name: twenty-secrets
          volumeMounts:
            - name: server-data
              mountPath: /app/packages/twenty-server/.local-storage
            - name: docker-data
              mountPath: /app/docker-data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: server-data
          persistentVolumeClaim:
            claimName: twenty-server-data
        - name: docker-data
          persistentVolumeClaim:
            claimName: twenty-docker-data
---
apiVersion: v1
kind: Service
metadata:
  name: twenty-server
  namespace: twenty-crm
  labels:
    app.kubernetes.io/name: twenty-server
spec:
  selector:
    app.kubernetes.io/name: twenty-server
  ports:
    - name: http
      port: 3000
      targetPort: http
