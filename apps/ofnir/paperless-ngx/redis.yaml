# Cache for Ofnir-Paperless (celery broker + cache). Same shape as
# homelab/paperless — broker state is lossy by design. Service name preserved.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: paperless-redis
  namespace: ofnir-paperless-ngx
spec:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
