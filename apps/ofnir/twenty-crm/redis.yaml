# Cache for Twenty CRM. Provisioned by the Dragonfly Operator.
# Twenty's docs require maxmemory-policy=noeviction — Dragonfly's default
# behaviour (no cache_mode flag) is noeviction (refuses writes when full
# rather than evicting), so no extra args needed. Service name preserved
# so twenty's REDIS_URL=redis://twenty-redis:6379 is unchanged.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: twenty-redis
  namespace: ofnir-twenty-crm
spec:
  replicas: 1
  args:
    - "--proactor_threads=1"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
