# Banka-3 school project (RAF-SI-2025).
#
# This is a wrapper: the actual manifests live in
# https://github.com/RAF-SI-2025/Banka-3-Infrastructure so the school team
# owns them under the RAF-SI-2025 GitHub org. Argo's repo-server pulls
# Banka-3-Infrastructure as a kustomize remote base when it renders this
# directory.
#
# Picked up by the existing `raf` ApplicationSet (appsets/raf.yaml):
#   dir apps/raf/banka → Application `raf-banka`, namespace `raf-banka`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/RAF-SI-2025/Banka-3-Infrastructure//?ref=main
