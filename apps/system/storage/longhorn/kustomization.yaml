apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn

resources:
  - namespace.yaml

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.10.2  # renovate: depName=longhorn/longhorn
    releaseName: longhorn
    namespace: longhorn
    valuesFile: values.yaml
    includeCRDs: true
