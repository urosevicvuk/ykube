apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault
  namespace: vault
  annotations:
    # Tailnet-only: grey-cloud A record (DNS-only, not proxied). external-dns
    # publishes the gateway-internal Service's tailnet IP; off-tailnet that IP
    # is unroutable, on-tailnet WireGuard delivers via the tailscale-operator
    # proxy pod into the gateway-internal Envoy.
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  parentRefs:
    - name: gateway-internal
      namespace: gateway
  hostnames:
    - vault.urosevicvuk.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vault
          port: 8200
