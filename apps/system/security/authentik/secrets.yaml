# Authentik core secrets. Populate in Vault:
#   kv/authentik-system/config: { secret-key, bootstrap-password, bootstrap-token }
#
# secret-key       : `openssl rand -base64 60 | tr -d '\n'` — the install's master
#                    key (signs sessions/tokens). NEVER rotate casually; losing it
#                    invalidates everything.
# bootstrap-password: initial akadmin password (consumed on first init only).
# bootstrap-token   : initial API token for akadmin (for blueprint/automation use).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secret
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret-key
      remoteRef:
        key: authentik-system/config
        property: secret-key
    - secretKey: bootstrap-password
      remoteRef:
        key: authentik-system/config
        property: bootstrap-password
    - secretKey: bootstrap-token
      remoteRef:
        key: authentik-system/config
        property: bootstrap-token
