apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik

resources:
  - namespace.yaml
  - cnpg-cluster.yaml
  - redis.yaml
  - secrets.yaml
  - httproute.yaml

helmCharts:
  - name: authentik
    repo: https://charts.goauthentik.io
    version: 2026.5.3 # renovate: depName=authentik
    releaseName: authentik
    namespace: authentik
    valuesFile: values.yaml
    includeCRDs: true

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
