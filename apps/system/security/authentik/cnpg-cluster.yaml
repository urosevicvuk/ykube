# Postgres for Authentik. Generates the secret `authentik-pg-app` with discrete
# `username` / `password` keys; values.yaml injects the password into the server
# + worker via AUTHENTIK_POSTGRESQL__PASSWORD.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  monitoring:
    enablePodMonitor: true
