apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-secrets

resources:
  - namespace.yaml
  - cluster-secret-store.yaml

helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.4.1  # renovate: depName=external-secrets/external-secrets
    releaseName: external-secrets
    namespace: external-secrets
    valuesFile: values.yaml
    includeCRDs: true

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
