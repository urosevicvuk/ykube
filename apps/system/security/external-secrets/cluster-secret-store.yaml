# ClusterSecretStore: the cluster-wide Vault binding every ExternalSecret refers to.
# Wave -20 — must exist before any ExternalSecret (wave -10) in any app
# references it. (Argo's cross-Application gating was removed in 1.8, so this
# wave is intra-Application only — but the negative offset still keeps it ahead
# of the ESO controller's other resources within this same Application.)
#
# Vault auth: Kubernetes auth method (configured by seed scripts). The ESO
# ServiceAccount in `external-secrets` namespace is bound to the `external-secrets`
# role in Vault, which permits read on kv/*.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  provider:
    vault:
      server: http://vault.vault:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
