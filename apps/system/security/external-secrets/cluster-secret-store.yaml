# ClusterSecretStore: the cluster-wide Vault binding every ExternalSecret refers to.
# Wave +5 — must apply AFTER the ESO controller deployment is healthy, otherwise
# nothing reconciles it to Healthy and Argo's wave gating deadlocks the rest of
# the Application. (Earlier this had -20, but Argo waits for each wave's resources
# to become Healthy before moving on; ClusterSecretStore needs the controller to
# turn Healthy, and the controller was in a later wave.)
#
# Vault auth: Kubernetes auth method (configured by seed scripts). The ESO
# ServiceAccount in `external-secrets` namespace is bound to the `external-secrets`
# role in Vault, which permits read on kv/*.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  provider:
    vault:
      server: http://vault.vault:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
