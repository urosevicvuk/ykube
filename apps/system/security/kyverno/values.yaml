# Kyverno policy engine. Policies live in ./policies/ and start in Audit mode
# so the first month of compliance violations surface in PolicyReports without
# blocking workloads. Flip to Enforce after the audit is clean.

admissionController:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

backgroundController:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

cleanupController:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

reportsController:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# ServiceMonitor scraped by kube-prometheus-stack.
admissionController.serviceMonitor:
  enabled: true
