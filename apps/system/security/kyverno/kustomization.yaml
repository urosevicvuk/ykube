apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno

resources:
  - namespace.yaml
  # All policies disabled while the platform's architecture is still
  # in flux. The keyless cosign + Audit policy is ready to flip on in
  # policies/verify-banka-images.yaml; the four tenant guardrails are
  # similarly ready. Re-enable once the shape stabilizes and we're
  # ready to triage PolicyReport noise.
  # - policies/disallow-latest-tag.yaml
  # - policies/require-labels.yaml
  # - policies/require-resource-limits.yaml
  # - policies/restrict-registries.yaml
  # - policies/verify-banka-images.yaml

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: 3.8.2  # renovate: depName=kyverno/kyverno
    releaseName: kyverno
    namespace: kyverno
    valuesFile: values.yaml
    includeCRDs: true

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
#
# NOTE: unlike the other system apps, we intentionally do NOT stamp
# `app.kubernetes.io/part-of` here. Kyverno reserves that label: its controller
# ClusterRoles aggregate rules from the `:core` roles via an aggregationRule that
# selects on `app.kubernetes.io/part-of: kyverno`. `includeSelectors: false`
# protects Deployment/Service selectors but NOT aggregationRule selectors, so
# overwriting the label to `system` breaks aggregation — the controller SAs end
# up with zero rules and the pods CrashLoop on their startup sanity check.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: argocd
