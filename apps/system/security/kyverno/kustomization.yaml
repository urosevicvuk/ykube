apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno

resources:
  - namespace.yaml
  # All policies disabled while the platform's architecture is still
  # in flux. The keyless cosign + Audit policy is ready to flip on in
  # policies/verify-banka-images.yaml; the four tenant guardrails are
  # similarly ready. Re-enable once the shape stabilizes and we're
  # ready to triage PolicyReport noise.
  # - policies/disallow-latest-tag.yaml
  # - policies/require-labels.yaml
  # - policies/require-resource-limits.yaml
  # - policies/restrict-registries.yaml
  # - policies/verify-banka-images.yaml

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: 3.6.0  # renovate: depName=kyverno/kyverno
    releaseName: kyverno
    namespace: kyverno
    valuesFile: values.yaml
    includeCRDs: true
