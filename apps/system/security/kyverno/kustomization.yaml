apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno

resources:
  - namespace.yaml
  # Tenant guardrails still disabled while we stabilize the platform.
  # - policies/disallow-latest-tag.yaml
  # - policies/require-labels.yaml
  # - policies/require-resource-limits.yaml
  # - policies/restrict-registries.yaml
  # Supply-chain policy is live in Audit mode — never blocks admission,
  # surfaces signature failures as PolicyReports for triage. Flip to
  # Enforce once we've seen a clean cycle (CI signs → image pulls in
  # cluster → policy validates → no audit-fail PolicyReport entries).
  - policies/verify-banka-images.yaml

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: 3.6.0  # renovate: depName=kyverno/kyverno
    releaseName: kyverno
    namespace: kyverno
    valuesFile: values.yaml
    includeCRDs: true
