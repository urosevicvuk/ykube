apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno

resources:
  - namespace.yaml
  # Policies disabled while we get the base cluster stable. Re-enable one by
  # one after everything else works. Files left in policies/ so re-enabling
  # is a one-line add per policy here.
  # - policies/disallow-latest-tag.yaml
  # - policies/require-labels.yaml
  # - policies/require-resource-limits.yaml
  # - policies/restrict-registries.yaml

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno/
    version: 3.6.0  # renovate: depName=kyverno/kyverno
    releaseName: kyverno
    namespace: kyverno
    valuesFile: values.yaml
    includeCRDs: true
