# Verifies cosign keyless signatures on Banka-3 images pulled into the
# raf-banka namespace from registry.urosevicvuk.dev/raf-banka3/*.
# Signatures are produced by Banka-3-Backend and Banka-3-Frontend CI
# in keyless mode: GitHub Actions OIDC -> Fulcio short-lived cert.
# Verification matches on the OIDC Subject (the workflow URL) + the
# issuer; no public key to manage or rotate.
#
# # Mode
#
# validationFailureAction: Audit. Violations show up as PolicyReports
# (kubectl get policyreport -A) and Kyverno metrics, but admission is
# never blocked. Flip to Enforce once we've verified a full deploy
# cycle (CI signs → image pulls in cluster → policy sees a valid
# signature → no audit-fail entries in PolicyReport).
#
# # Subject pattern
#
# The Fulcio cert Subject for a GitHub Actions keyless signature is:
#   https://github.com/<owner>/<repo>/.github/workflows/<file>@<ref>
# where <ref> is e.g. refs/heads/main, refs/heads/deploy, or
# refs/tags/v1.2.3. We allow:
#   * Backend and Frontend repos
#   * main / deploy branch builds
#   * any v* tag build
# subjectRegExp pins the path so a future workflow file at a
# different path wouldn't accidentally satisfy the policy.
#
# # Images outside raf-banka3
#
# imageReferences scopes to "registry.urosevicvuk.dev/raf-banka3/*"
# only. Third-party images (CNPG postgres, redis:alpine, nginx-
# unprivileged) don't match, so the policy is a no-op on them.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-banka-images
  annotations:
    policies.kyverno.io/title: Verify Banka-3 cosign signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: |
      Pods in the raf-banka namespace running images from
      registry.urosevicvuk.dev/raf-banka3/* must carry a valid cosign
      keyless signature whose Fulcio cert Subject matches one of the
      Banka-3 build workflows on main, deploy, or a v* tag.
spec:
  validationFailureAction: Audit
  webhookTimeoutSeconds: 30
  rules:
    - name: check-cosign-keyless-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - raf-banka
      verifyImages:
        - imageReferences:
            - "registry.urosevicvuk.dev/raf-banka3/*"
          required: true
          mutateDigest: false
          attestors:
            - count: 1
              entries:
                - keyless:
                    subjectRegExp: '^https://github\.com/RAF-SI-2025/Banka-3-(Backend|Frontend)/\.github/workflows/build\.yml@refs/(heads/(main|deploy)|tags/v.+)$'
                    issuer: https://token.actions.githubusercontent.com
                    rekor:
                      url: https://rekor.sigstore.dev
