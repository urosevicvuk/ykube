# ClusterSecretStore: the cluster-wide Vault binding every ExternalSecret refers to.
# Wave 5 — must apply after the ESO controller is up (so the CRD exists).
#
# Vault auth: Kubernetes auth method (TF stage 06 enables it). The ESO ServiceAccount
# in `external-secrets` namespace is bound to the `external-secrets` role in Vault,
# which permits read on kv/* (TF stage 07).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  provider:
    vault:
      server: http://vault.vault:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
