# Vault, raft HA. 3 replicas, one per node (hostname anti-affinity).
# TLS terminates at the cluster Gateway; Vault speaks HTTP in-cluster.
# ESO consumes via Kubernetes auth (SA: external-secrets/external-secrets).

global:
  tlsDisable: true

injector:
  enabled: false

server:
  image:
    repository: hashicorp/vault
    tag: "1.18.3"

  # IPC_LOCK kept for mlock (no swap on Talos, but conventional and harmless).
  # SYS_CHROOT dropped — baseline PSS would warn but vault chart does not need it.

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: longhorn

  # Audit goes to stdout (collected by Loki).
  auditStorage:
    enabled: false

  serviceAccount:
    create: true
    name: vault
    serviceAccountToken:
      enabled: true

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address     = "[::]:8200"
          cluster_address = "[::]:8201"
          telemetry {
            unauthenticated_metrics_access = "true"
          }
        }

        storage "raft" {
          path = "/vault/data"
          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        service_registration "kubernetes" {}

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }

        log_level = "info"

  # One replica per node — required anti-affinity, no two on the same host.
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ template "vault.name" . }}
              app.kubernetes.io/instance: "{{ .Release.Name }}"
              component: server
          topologyKey: kubernetes.io/hostname

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

ui:
  enabled: true
  serviceType: ClusterIP

serverTelemetry:
  serviceMonitor:
    enabled: true
  prometheusRules:
    enabled: false
