# Public-facing Gateway. Fronted by cloudflared (apps/system/networking/
# cloudflared/) which terminates the Cloudflare Tunnel and forwards to the
# stable `envoy-external` ClusterIP (gateway-service.yaml). Per-host SNI
# selects the right TLS listener.
#
# Lives in envoy-gateway-system alongside the controller, the data-plane
# Envoy pods, and the wildcard cert Secrets — same namespace throughout
# means no cross-namespace references.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-external
  namespace: envoy-gateway-system
  annotations:
    # Force external-dns to write CNAMEs pointing at the cloudflared tunnel,
    # NOT A records pointing at the Gateway's status address. Without this,
    # external-dns reads `status.addresses: [192.168.1.240, 100.65.172.104]`
    # and leaks the cluster LB IP + Tailscale IP into public DNS, which
    # also doesn't route from the internet anyway.
    #
    # `cloudflare-proxied=true` makes the CNAME orange-cloud proxied so
    # Cloudflare's edge handles TLS and forwards into the tunnel.
    external-dns.alpha.kubernetes.io/target: 67f9c7d3-6182-4f5b-946c-c5c676edd958.cfargotunnel.com
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  gatewayClassName: eg-external
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # One listener per zone — Envoy needs per-listener `hostname:` to
    # generate distinct SNI matchers. A single listener with multiple
    # certificateRefs produces duplicate filter chains with the same matcher
    # and the envoy listener never adds (NACK on xDS).
    - name: https-urosevicvuk
      protocol: HTTPS
      port: 443
      hostname: "*.urosevicvuk.dev"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-urosevicvuk-dev-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-morel
      protocol: HTTPS
      port: 443
      hostname: "*.morel.rs"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-morel-rs-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-raf
      protocol: HTTPS
      port: 443
      hostname: "*.raf-project.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-raf-project-com-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-ofnir
      protocol: HTTPS
      port: 443
      hostname: "*.ofnir.dev"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-ofnir-dev-tls
      allowedRoutes:
        namespaces:
          from: All
