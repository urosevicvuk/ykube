# GatewayClass for the public ingress lane (cloudflared).
#
# Backed by the same Envoy Gateway controller as the internal class, with
# parametersRef pointing at the lane-local EnvoyProxy that pins the data-
# plane Service to ClusterIP. We don't need a LoadBalancer here because
# cloudflared dials *out* over the Cloudflare Tunnel and forwards inbound
# traffic to the stable ClusterIP `envoy-external` (gateway-service.yaml).
# Without the override the controller would provision a LoadBalancer
# Service and burn a Cilium LB IP that nothing uses.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg-external
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: external
    namespace: envoy-gateway-system
