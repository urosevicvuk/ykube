apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: gateway-external
      sectionName: http
      group: gateway.networking.k8s.io
      kind: Gateway
  rules:
    # CRD admission webhook defaults `matches: [{path: PathPrefix /}]` when
    # no match is specified; write it explicitly so git matches live.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
