# gateway-external — public ingress lane (cloudflared).
#
# Self-contained: GatewayClass, EnvoyProxy params, the Gateway resource,
# the stable ClusterIP shim that cloudflared targets, and the HTTP→HTTPS
# redirect route. Shares envoy-gateway-system namespace with the controller
# (apps/system/networking/envoy/) and the wildcard cert Secrets it
# references by name.
# No top-level `namespace:` — GatewayClass is cluster-scoped and kustomize
# would forcibly stamp a namespace field on it (kustomize only recognises
# built-in cluster-scoped kinds, not CRDs). Every resource declares its
# own namespace explicitly instead.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - gatewayclass.yaml
  - envoyproxy.yaml
  - gateway.yaml
  - gateway-service.yaml
  - http-redirect-route.yaml
