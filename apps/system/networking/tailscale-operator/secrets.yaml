# Tailscale "Auth Credential" for the k8s operator (formerly "OAuth client").
# Create in Tailscale admin → Settings → Auth Credentials with WRITE scopes:
#   - General → Services
#   - Devices → Core
#   - Keys → Auth Keys
# Tag the credential `tag:k8s-operator`. Store the resulting client id/secret:
#   vault kv put kv/tailscale/operator-oauth \
#     client_id=tskey-client-... client_secret=tskey-client-...
#
# Policy file must define `tag:k8s-operator` (operator's tag) and `tag:k8s`
# (the tag the operator assigns to proxies it spawns), with `tag:k8s-operator`
# as owner of `tag:k8s` and an ACL allowing your devices to reach `tag:k8s:*`.
#
# Secret name `operator-oauth` is the chart default — when oauth.clientId/
# clientSecret are unset in values.yaml the chart looks for this exact name.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: tailscale/operator-oauth
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: tailscale/operator-oauth
        property: client_secret
