# Stable-named ClusterIP that cloudflared targets.
#
# Envoy Gateway auto-creates a Service per Gateway with a name like
# `envoy-<ns>-<name>-<hash>` (e.g. envoy-envoy-gateway-system-gateway-
# external-9ec3fa43). The hash is derived from Gateway namespace+name so
# it's deterministic, but referencing it from cloudflared is fragile — it
# changes if the Gateway is ever renamed or moved namespace.
#
# This Service label-selects the same data-plane pods and gives cloudflared
# a stable name (`envoy-external.envoy-gateway-system.svc.cluster.local`).
# targetPorts 10080/10443 are Envoy Gateway's internal unprivileged ports
# (it avoids 80/443 because binding low ports requires NET_BIND_SERVICE).
apiVersion: v1
kind: Service
metadata:
  name: envoy-external
  namespace: envoy-gateway-system
spec:
  type: ClusterIP
  selector:
    gateway.envoyproxy.io/owning-gateway-name: gateway-external
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
  ports:
    - name: http
      port: 80
      targetPort: 10080
    - name: https
      port: 443
      targetPort: 10443
