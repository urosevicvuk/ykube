# Wildcard certs per zone — shared between the external (cloudflared) and
# internal (tailnet) lanes. Both Gateways live in envoy-gateway-system and
# reference these Secrets by name; same-namespace = no ReferenceGrant needed.
#
# All issued via letsencrypt-prod (cert-manager) using Cloudflare DNS-01.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-urosevicvuk-dev
  namespace: envoy-gateway-system
spec:
  secretName: wildcard-urosevicvuk-dev-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: '*.urosevicvuk.dev'
  dnsNames:
    - urosevicvuk.dev
    - '*.urosevicvuk.dev'
---
