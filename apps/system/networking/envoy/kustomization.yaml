# Envoy Gateway — controller + both ingress lanes (one Argo Application owns all).
#
# Owns:
#   - The Envoy Gateway controller (Helm chart) in envoy-gateway-system.
#   - The four wildcard TLS Certificates issued by cert-manager.
#   - gateway-external/ — public lane (cloudflared origin).
#   - gateway-internal/ — tailnet lane (tailscale-operator LB class).
#
# Lane subdirs hold everything specific to their lane (GatewayClass,
# EnvoyProxy params, the Gateway resource). They share envoy-gateway-system
# and reference the cert Secrets by name (no cross-ns refs, no ReferenceGrant).
#
# Gateway API CRDs are NOT managed here. They're installed by the bootstrap
# script (seed-k3s/scripts/00-cilium-install.sh) directly via
# `kubectl apply --server-side` from the v1.4.1 experimental-install.yaml.
# Reason: HTTPRoute's OpenAPI schema is too large for client-side apply's
# last-applied-configuration annotation (256KB limit). Argo can apply it
# once via SSA, but subsequent diffs fall back to client-side and bust the
# limit, causing perpetual sync failures. Having the bootstrap own them
# avoids the loop. To update CRDs: change the version in 00-cilium-install.sh
# and re-run `task -d seed-k3s cilium:install` — idempotent.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system

resources:
  - namespace.yaml
  - certificate.yaml
  - gateway-external
  - gateway-internal

helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy
    version: 1.8.2  # renovate: depName=envoyproxy/gateway
    releaseName: eg
    namespace: envoy-gateway-system
    valuesFile: values.yaml
    includeCRDs: true

# Strip the safe-upgrades VAP/VAPB that the chart ships unconditionally.
# It's a vendored copy of the Gateway API 1.5.x downgrade-blocker which
# bricks our deliberately-pinned 1.4.1 Gateway API CRDs. There's no helm
# value to disable it, so we drop it at the kustomize layer.
patches:
  - target:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionPolicy
      name: safe-upgrades.gateway.networking.k8s.io
    patch: |
      $patch: delete
      apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicy
      metadata:
        name: safe-upgrades.gateway.networking.k8s.io
  - target:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionPolicyBinding
      name: safe-upgrades.gateway.networking.k8s.io
    patch: |
      $patch: delete
      apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicyBinding
      metadata:
        name: safe-upgrades.gateway.networking.k8s.io

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
