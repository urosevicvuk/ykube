# cloudflared tunnel credentials JSON, from Vault.
# Provisioned by seed-k3s/scripts/03-vault-secrets-provision.sh; value is the
# raw `credentials.json` blob that `cloudflared tunnel create` writes.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-credentials
  namespace: cloudflared
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflared-credentials
    creationPolicy: Owner
  data:
    - secretKey: credentials.json
      remoteRef:
        key: cloudflared/credentials
        property: credentials.json
