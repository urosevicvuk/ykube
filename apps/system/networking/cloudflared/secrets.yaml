# cloudflared tunnel credentials JSON, from Vault.
# Provisioned by seed-k3s/scripts/03-vault-secrets-provision.sh; value is the
# raw `credentials.json` blob that `cloudflared tunnel create` writes.
#
# Uses `dataFrom.extract` instead of `data[].property` because the Vault field
# name is literally `credentials.json` (with a dot). ESO's gjson-based
# `property:` traversal treats `.` as a nested-field separator and there's no
# escape syntax that works for both gjson and YAML — escaping ends up as a
# literal backslash-dot key that doesn't match. `dataFrom.extract` just dumps
# every key from the Vault secret verbatim into the K8s Secret with matching
# names — no property selection, no ambiguity.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-credentials
  namespace: cloudflared
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflared-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: cloudflared/credentials
  data: []
