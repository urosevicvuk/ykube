# cloudflared tunnel ingress config.
#
# One wildcard entry per zone — adding a new public hostname no longer
# requires editing this file, just add an HTTPRoute on `gateway-external`
# with the new hostname and external-dns publishes the CNAME automatically.
#
# How a request flows in:
#   1. Client → Cloudflare edge for `foo.urosevicvuk.dev`
#   2. Edge sees the CNAME → tunnel UUID → forwards into this cloudflared
#   3. cloudflared matches the wildcard `*.urosevicvuk.dev` ingress rule
#   4. cloudflared opens TLS to envoy-external.envoy-gateway-system:443
#      with SNI = `urosevicvuk.dev` (originServerName below)
#   5. Envoy listener `*.urosevicvuk.dev` accepts the SNI, terminates TLS
#      with the wildcard cert
#   6. Envoy reads the original Host header (`foo.urosevicvuk.dev`,
#      preserved by cloudflared because we don't set httpHostHeader) and
#      matches the corresponding HTTPRoute → backend Service
#
# `originServerName` per zone: cloudflared sends this as the TLS SNI to
# Envoy. SNI is used by Envoy for listener+cert selection only — any
# concrete name in the zone works because the cert is wildcard. HTTPRoute
# routing keys off the Host header, not SNI, so per-host routing still
# works correctly.
#
# `noTLSVerify=true` is intentional — see the noTLSVerify section below
# for the in-cluster cert validity rationale.
#
# `httpHostHeader` deliberately omitted — when unset, cloudflared
# preserves the original request's Host header, which is exactly what
# HTTPRoute matching needs.
#
# `envoy-external.envoy-gateway-system` is the stable-named ClusterIP
# Service defined in apps/system/networking/gateway-external/
# gateway-service.yaml. Avoids the auto-generated hash-suffixed name
# (envoy-envoy-gateway-system-gateway-external-<hash>) which would
# change if the Gateway resource is ever renamed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # Use the tunnel UUID directly, not the name. Looking up a tunnel by
    # name requires the `cert.pem` origin cert (from `cloudflared tunnel
    # login`), which we don't ship to the cluster — only the per-tunnel
    # credentials.json. The UUID matches credentials.json's `TunnelID`.
    tunnel: 67f9c7d3-6182-4f5b-946c-c5c676edd958
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    # One apex + one wildcard per public zone. Add a new public app by
    # creating its HTTPRoute on `gateway-external` — no edits here required,
    # as long as the hostname is under one of these zones. Wildcards don't
    # cover the bare apex (DNS rule), so each zone needs both entries.
    ingress:
      - hostname: "urosevicvuk.dev"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: urosevicvuk.dev
      - hostname: "*.urosevicvuk.dev"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: urosevicvuk.dev
      - hostname: "morel.rs"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: morel.rs
      - hostname: "*.morel.rs"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: morel.rs
      - hostname: "raf-project.com"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: raf-project.com
      - hostname: "*.raf-project.com"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: raf-project.com
      - hostname: "ofnir.dev"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: ofnir.dev
      - hostname: "*.ofnir.dev"
        service: https://envoy-external.envoy-gateway-system:443
        originRequest:
          noTLSVerify: true
          originServerName: ofnir.dev
      # Catch-all 404 for anything that doesn't match a zone above (or
      # that somehow reaches cloudflared without a corresponding HTTPRoute
      # — which shouldn't happen, since external-dns only publishes CNAMEs
      # for hostnames an HTTPRoute requested).
      - service: http_status:404
