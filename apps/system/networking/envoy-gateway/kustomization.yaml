# Envoy Gateway — replaces Cilium's broken Gateway API impl on single-node
# clusters. Ships its own `eg` GatewayClass automatically.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system

resources:
  - namespace.yaml
  - gatewayclass.yaml

helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy
    version: v1.8.0  # renovate: depName=envoyproxy/gateway
    releaseName: eg
    namespace: envoy-gateway-system
    valuesFile: values.yaml
    includeCRDs: true
