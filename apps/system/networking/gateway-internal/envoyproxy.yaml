# Parameters for the `eg-internal` GatewayClass.
#
# Directs the data-plane LB Service to the tailscale-operator (not Cilium's
# LB IPAM), and binds it to the shared `gateway-ingress` ProxyGroup for HA.
#
# The `proxy-group` annotation makes the operator skip the per-Service-proxy
# pattern and instead use the pre-existing pool of replicas defined in
# apps/system/networking/tailscale-operator/proxygroup-gateway-ingress.yaml.
# Result on the tailnet: a single Tailscale Service named `gateway-internal`
# (one device-list entry, multiple backing replicas) that proxies to this
# Envoy's ClusterIP. external-dns publishes per-route CNAMEs to that
# hostname.
#
# Direct (non-DERP) WireGuard reachability is provided via the
# `tailscale-edge` ProxyClass referenced by the ProxyGroup — that opens the
# operator-managed NodePort UDP range on edge-labeled nodes.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: internal
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/proxy-group: gateway-ingress
          tailscale.com/hostname: gateway-internal
