apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  # Imported by the k3s-managed Corefile via `import /etc/coredns/custom/*.server`.
  # Zone-scoped forward to public resolvers so cloudflared/external-dns don't
  # depend on the LAN gateway (192.168.0.1) being a healthy DNS server.
  external.server: |
    cloudflare.com:53 argotunnel.com:53 cloudflareaccess.com:53 github.com:53 githubusercontent.com:53 githubapp.com:53 ghcr.io:53 argoproj.github.io:53 letsencrypt.org:53 acme-v02.api.letsencrypt.org:53 helm.sh:53 {
        errors
        cache 30
        forward . 1.1.1.1 1.0.0.1 {
            prefer_udp
        }
    }
