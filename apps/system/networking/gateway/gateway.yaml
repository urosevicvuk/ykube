apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  namespace: gateway
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        # SNI selects between these four certificates per request hostname.
        certificateRefs:
          - kind: Secret
            name: wildcard-urosevicvuk-dev-tls
          - kind: Secret
            name: wildcard-morel-rs-tls
          - kind: Secret
            name: wildcard-raf-project-com-tls
          - kind: Secret
            name: wildcard-ofnir-dev-tls
      allowedRoutes:
        namespaces:
          from: All
