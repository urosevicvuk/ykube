# Wildcard certs per domain. Each Certificate produces a TLS Secret in the
# gateway namespace; the Gateway HTTPS listener references all four secrets,
# and selects per request via SNI.
#
# All issued via letsencrypt-prod (cert-manager) using Cloudflare DNS-01.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-urosevicvuk-dev
  namespace: gateway
spec:
  secretName: wildcard-urosevicvuk-dev-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: '*.urosevicvuk.dev'
  dnsNames:
    - urosevicvuk.dev
    - '*.urosevicvuk.dev'
---
