# Cross-namespace secret access: Envoy Gateway runs the data-plane proxy in
# `envoy-gateway-system`, but the wildcard TLS Secrets live here in `gateway`.
# Gateway API requires an explicit ReferenceGrant to permit this read.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-tls-secrets
  namespace: gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Secret
