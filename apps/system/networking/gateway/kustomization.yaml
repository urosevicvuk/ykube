apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No top-level `namespace:` — every resource declares its own. The
# `gateway-service.yaml` Service lives in `envoy-gateway-system` (alongside
# the controller's auto-created data-plane Services), while everything else
# lives in `gateway`. A top-level namespace would override the Service's
# explicit one and put it in the wrong place.

resources:
  - namespace.yaml
  # Gateway API CRDs are NOT managed by Argo. They're installed by the
  # bootstrap script (seed-k3s/scripts/00-cilium-install.sh) directly via
  # `kubectl apply --server-side` from the v1.4.1 experimental-install.yaml.
  # The reason: HTTPRoute's OpenAPI schema is too large for client-side
  # apply's last-applied-configuration annotation (256KB limit). Argo can
  # apply it the first time via SSA, but subsequent diff/patch operations
  # fall back to client-side and bust the limit, causing perpetual sync
  # failures. Having the bootstrap own them avoids the loop.
  #
  # To update CRDs: change the version in 00-cilium-install.sh and re-run
  # `task -d seed-k3s cilium:install`. Idempotent.
  - gateway.yaml
  - gatewayclass-internal.yaml
  - envoyproxy-internal.yaml
  - gateway-service.yaml
  - reference-grant.yaml
  - certificate.yaml
  - http-redirect-route.yaml
