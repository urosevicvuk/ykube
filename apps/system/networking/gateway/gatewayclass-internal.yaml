# Second GatewayClass, same envoy-gateway controller as `eg`, but with
# parametersRef pointing at the tailscale-flavored EnvoyProxy. Gateways with
# `gatewayClassName: eg-internal` get a tailscale-operator-provisioned LB
# instead of a Cilium-announced one. Two Envoy deployments total: one per
# Gateway (Envoy Gateway's default 1:1 model).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg-internal
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: gateway-internal
    namespace: gateway
