# Cilium installs into kube-system per Talos+Cilium convention.
# The AppSet's destination.namespace is "cilium" (from {{path.basename}}) but
# kustomize rewrites every namespaced resource here to kube-system, and the
# AppSet no longer carries CreateNamespace=true — so no stray empty namespace
# is created. kube-system itself is created by Talos at cluster init.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

resources:
  - lb-ip-pool.yaml
  - l2-announcement-policy.yaml
  - httproute.yaml
  # CCNPs disabled — a CCNP that selects reserved:host implicitly turns on
  # host-firewall enforcement, which adds another moving piece while we're
  # stabilizing the base cluster. Re-enable once everything else works.
  # - cluster-policies.yaml

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.20.0-rc.0  # renovate: depName=cilium/cilium
    releaseName: cilium
    namespace: kube-system
    valuesFile: values.yaml
    includeCRDs: true

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
