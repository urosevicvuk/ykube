# Cilium installs into kube-system per Talos+Cilium convention.
# The platform ApplicationSet template sets destination.namespace='{{path.basename}}'
# which becomes "cilium" — Argo will create that namespace empty (cruft, harmless)
# while all actual resources land in kube-system as set below.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

resources:
  - lb-ip-pool.yaml
  - l2-announcement-policy.yaml

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.19.3  # renovate: depName=cilium/cilium
    releaseName: cilium
    namespace: kube-system
    valuesFile: values.yaml
    includeCRDs: true
