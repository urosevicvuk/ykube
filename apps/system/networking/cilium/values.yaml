# Cilium values, tuned for k3s on NixOS (firelink).
#
# k3s prerequisites (set in ynix's modules/features/cluster/k3s.nix):
#   --flannel-backend=none       # we install Cilium ourselves
#   --disable-kube-proxy         # Cilium replaces kube-proxy
#   --disable-network-policy     # Cilium enforces policy
#   --disable=servicelb          # Cilium L2 announces LB IPs
#   --disable=traefik            # Gateway API instead
#
# For the future Talos+Proxmox cluster (seed-talos/), k8sServiceHost flips back to
# `localhost:7445` (KubePrism) and the cgroup block stays as-is.
#
# References:
#   - https://docs.cilium.io/en/stable/installation/k8s-install-helm/
#   - https://docs.k3s.io/networking/distributed-multicloud#deploying-cilium

# Use Kubernetes IPAM.
ipam:
  mode: kubernetes

# Replace kube-proxy entirely.
kubeProxyReplacement: true

# Socket-level load balancer: intercept ClusterIP traffic at the cgroup/socket layer
# (connect/sendmsg) so pod-to-service goes straight to the backend pod IP. Without
# this, traffic falls through to the packet-level path and UDP (notably DNS) flakes
# out — symptom: pods can't resolve cluster.local, Argo apps stuck OutOfSync with
# repo-server DNS timeouts.
#
# hostNamespaceOnly: restrict socket-LB to the host network namespace; pod-side
# Service traffic falls back to tc-level handling. Required for tailscale-operator
# LoadBalancer-class proxies (gateway-internal): they DNAT incoming tailnet traffic
# to a ClusterIP and MASQUERADE the source via in-pod nftables. Without
# hostNamespaceOnly, Cilium's socket-LB bypasses those netfilter hooks at the
# pod's egress socket and the return packets from the Service backend don't match
# the proxy pod's conntrack, so SYN goes out but SYN-ACK never gets back to the
# tailnet client. (See cilium/cilium#17738 for the apiserver-reachability caveat
# in some setups — not affecting this single-node k3s cluster.)
socketLB:
  enabled: true
  hostNamespaceOnly: true

# eBPF masquerade instead of iptables. The iptables masquerade reconciler in
# Cilium 1.19 has a startup bug where it tries to delete a phantom rule from
# OLD_CILIUM_POST_nat, fails with "iptables: Bad rule", and aborts the entire
# reconcile cycle — leaving CILIUM_POST_nat empty. Pods then can't egress to
# the internet (no SNAT), CoreDNS can't forward to upstream DNS, Argo can't
# pull from GitHub. BPF masquerade bypasses iptables for this path entirely.
bpf:
  masquerade: true
  # BPF-based TPROXY (bpf_sk_assign) instead of iptables xt_TPROXY for the L7
  # proxy redirect. REQUIRED for Cilium Gateway API to work on this cluster.
  #
  # Diagnosis (2026-06-26, live capture, Cilium 1.19.5): a same-node curl to a
  # `gatewayClassName: cilium` HTTPRoute times out. Traced hop-by-hop, every
  # control-plane stage is correct — Gateway Programmed, CEC/xDS ACKed, BPF LB
  # has the VIP→`L7LB Proxy Port 15581` redirect, Envoy is listening on
  # 127.0.0.1:15581, the BPF datapath fires `-> proxy port 15581 ... SYN`, and
  # the iptables `-j TPROXY --on-port 15581` rule counter increments per SYN.
  # But ZERO connections reach Envoy and `cilium monitor` records NO drop.
  #
  # This is NOT #42325 (that's a policy DROP on the return SYN-ACK — we see no
  # SYN-ACK and no drop at all). The SYN never reaches Envoy: with iptables
  # TPROXY under bpf host-routing + vxlan tunnel + socket-LB, the TPROXY
  # socket-steal isn't honored, so the marked packet falls through to the
  # to-proxy routing rule (table 2004 `local default dev lo`), nobody owns
  # 192.168.0.2:80 on lo, and the kernel silently drops it below the BPF layer.
  # (Same machinery as the toFQDNs DNS-proxy drop in cilium/cilium#46284.)
  #
  # bpf.tproxy moves the socket assignment into the tc BPF program at the moment
  # the redirect is chosen, eliminating the iptables xt_TPROXY rule and the
  # table-2004 fallback entirely. Kernel supports it (bpf host-routing is active).
  tproxy: true

# k3s apiserver listens on 6443 on every node (single-node cluster, this is firelink itself).
k8sServiceHost: 127.0.0.1
k8sServicePort: "6443"

# NixOS already mounts cgroup2 — leave Cilium's automount disabled to avoid the same fight
# we had on Talos. NixOS cgroup root path is the same as Talos.
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos requires explicit capability sets — Cilium's defaults assume host-managed cgroups.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Gateway API: ENABLED to test viability of moving off Envoy Gateway.
#
# Background — what we audited (2026-06-23, Cilium 1.19.5):
#   - #35559 / #36004: original L7 return-path bugs, CLOSED in 1.17.x line
#   - #42325: STILL OPEN. Same-node ingress→workload TCP SYN-ACK gets dropped
#     because Cilium's policy engine misclassifies the source as "host" instead
#     of "ingress" and denies return traffic. Our single-node cluster is the
#     exact failure mode this bug describes. Bug fires even with no explicit
#     CiliumNetworkPolicy in place — it's entity-classification at the eBPF
#     datapath layer.
#
# Migration plan: enable gatewayAPI here, leave Envoy Gateway-managed routes
# untouched (different GatewayClass — they coexist), then run a sandbox
# HTTPRoute with `gatewayClassName: cilium` against a throwaway echo pod
# scheduled to the same node as the ingress. If a same-node curl succeeds,
# #42325 doesn't trigger on our cluster and we migrate gateway-internal +
# gateway-external. If it times out, revert this flag and re-evaluate when
# #42325 closes or when we land Talos+3VM (cross-node paths work fine).
#
# enabled=true also flips on `enable-envoy-config` automatically. Envoy
# runs embedded in cilium-agent for now; if we keep Cilium Gateway, the
# next step is `envoy.enabled: true` to run it as a dedicated DaemonSet
# (cleaner upgrades, separate scaling, the Cilium 1.16+ recommendation).
gatewayAPI:
  enabled: true
  # ALPN negotiation (HTTP/2 → HTTP/1.1 fallback). Required for HTTPS
  # listeners that need to serve both HTTP/2 and HTTP/1.1 clients.
  enableAlpn: true

# Dedicated Envoy DaemonSet (vs embedded in cilium-agent).
# NOTE (2026-06-26): originally enabled on the hypothesis that it fixed the
# same-node Gateway timeout (the #42325 return-path entity-classification
# theory). The live capture disproved that — the SYN never reaches Envoy at
# all, so a cleaner Envoy identity was never the issue (see bpf.tproxy above;
# the real fix is BPF TPROXY). Keeping it anyway: the dedicated DaemonSet is
# the Cilium 1.16+ canonical setup (cleaner upgrades, separate scaling). The
# cilium-envoy pod runs hostNetwork=true, so it shares the host netns with the
# agent and the TPROXY/socket plumbing is identical to the embedded case.
envoy:
  enabled: true

# L2 announcements replace MetalLB. Combined with kubeProxyReplacement, lets Cilium
# advertise LB IPs on the LAN via ARP/NDP. Pool + policy live in separate manifests
# so they can be tweaked independently of the chart values.
l2announcements:
  enabled: true
externalIPs:
  enabled: true

# Cilium agent + operator self-metrics. kube-prometheus-stack auto-
# discovers ServiceMonitors cluster-wide so flipping these on is the
# whole wiring — Prometheus picks them up on its next reconcile.
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true

# Hubble for observability. Relay aggregates flows; UI is web frontend.
# Expose UI via the Cilium Gateway later; until then, port-forward.
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    # ServiceMonitor for Hubble metrics — same auto-discovery story as
    # Cilium agent. Without this, the metrics endpoint is exposed but
    # Prometheus never scrapes it.
    serviceMonitor:
      enabled: true
    # httpV2 supersedes the old `http` metric set: better histogram
    # buckets, exemplars (jump from metric → trace in Grafana), and
    # source/destination namespace context labels for top-N queries.
    # See https://docs.cilium.io/en/stable/observability/metrics/#hubble-metrics
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:exemplars=true;labelsContext=source_namespace,destination_namespace,source_workload,destination_workload,traffic_direction

operator:
  replicas: 1
  # Operator self-metrics (reconcile loop counters, error rates).
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

# Single-stack IPv4 for the homelab. Flip if you go dual-stack.
ipv4:
  enabled: true
ipv6:
  enabled: false

# CRDs are baked into the chart and tracked via ServerSideApply (see ApplicationSet syncOptions).

# CRDs are baked into the chart and tracked via ServerSideApply (see ApplicationSet syncOptions).
