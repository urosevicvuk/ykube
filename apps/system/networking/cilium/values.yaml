# Cilium values, tuned for k3s on NixOS (firelink).
#
# k3s prerequisites (set in ynix's modules/features/cluster/k3s.nix):
#   --flannel-backend=none       # we install Cilium ourselves
#   --disable-kube-proxy         # Cilium replaces kube-proxy
#   --disable-network-policy     # Cilium enforces policy
#   --disable=servicelb          # Cilium L2 announces LB IPs
#   --disable=traefik            # Gateway API instead
#
# For the future Talos+Proxmox cluster (seed-talos/), k8sServiceHost flips back to
# `localhost:7445` (KubePrism) and the cgroup block stays as-is.
#
# References:
#   - https://docs.cilium.io/en/stable/installation/k8s-install-helm/
#   - https://docs.k3s.io/networking/distributed-multicloud#deploying-cilium

# Use Kubernetes IPAM.
ipam:
  mode: kubernetes

# Replace kube-proxy entirely.
kubeProxyReplacement: true

# Socket-level load balancer: intercept ClusterIP traffic at the cgroup/socket layer
# (connect/sendmsg) so pod-to-service goes straight to the backend pod IP. Without
# this, traffic falls through to the packet-level path and UDP (notably DNS) flakes
# out — symptom: pods can't resolve cluster.local, Argo apps stuck OutOfSync with
# repo-server DNS timeouts.
socketLB:
  enabled: true

# eBPF masquerade instead of iptables. The iptables masquerade reconciler in
# Cilium 1.19 has a startup bug where it tries to delete a phantom rule from
# OLD_CILIUM_POST_nat, fails with "iptables: Bad rule", and aborts the entire
# reconcile cycle — leaving CILIUM_POST_nat empty. Pods then can't egress to
# the internet (no SNAT), CoreDNS can't forward to upstream DNS, Argo can't
# pull from GitHub. BPF masquerade bypasses iptables for this path entirely.
#
# hostLegacyRouting=true falls back to the kernel routing stack for traffic
# entering/leaving the host endpoint. Required (with endpointRoutes below)
# for Cilium 1.19 Gateway API L7 LB to reach same-node backends — the BPF
# fast path mistags the return identity (ingress vs host) and Envoy 503s
# on every request. Costs a touch of latency vs the BPF host-routing path.
bpf:
  masquerade: true
  hostLegacyRouting: true

# Per-endpoint routes via the pod's veth instead of funneling all pod traffic
# through cilium_host. Required for Cilium 1.19 Gateway API L7 LB to work on
# single-node clusters: without this, Envoy's outbound to a same-node backend
# leaves with identity `ingress` but the return SYN-ACK arrives tagged
# `host`, BPF conntrack doesn't match the asymmetric flow, and Envoy returns
# 503 "upstream connect timeout" on every request through the gateway.
endpointRoutes:
  enabled: true

# k3s apiserver listens on 6443 on every node (single-node cluster, this is firelink itself).
k8sServiceHost: 127.0.0.1
k8sServicePort: "6443"

# NixOS already mounts cgroup2 — leave Cilium's automount disabled to avoid the same fight
# we had on Talos. NixOS cgroup root path is the same as Talos.
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos requires explicit capability sets — Cilium's defaults assume host-managed cgroups.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Gateway API: enabled here only flips Cilium into Gateway-API mode and creates
# the `cilium` GatewayClass. The Gateway API CRDs themselves are installed by
# `apps/system/networking/gateway/` (upstream kubernetes-sigs/gateway-api).
#
# hostNetwork.enabled bypasses the LoadBalancer Service + BPF L7LB redirect
# path. Envoy listens directly on host ports 80/443 instead. Working around
# Cilium issues #35559 / #36004 / #42325: on single-node clusters the BPF
# L7LB redirect mistags return-path identity (ingress vs host), Envoy's
# upstream connect times out, and every request through the gateway 503s.
# The LoadBalancer Service goes away with this; L2 announcement of
# 192.168.1.240 is no longer relevant.
gatewayAPI:
  enabled: true
  hostNetwork:
    enabled: true

# Embed Envoy inside cilium-agent instead of the standalone cilium-envoy
# DaemonSet. The external proxy mode (chart default) wraps every Gateway
# listener in the BPF L7LB redirect path (envoy bound to 127.0.0.1:<random>,
# clients hit ClusterIP, BPF redirects), which is exactly the path that's
# broken on single-node clusters (see hostNetwork comment above). Embedded
# envoy honors the hostNetwork.enabled flag and binds listeners on
# 0.0.0.0:80 / :443 of the host as advertised.
envoy:
  enabled: false

# L2 announcements replace MetalLB. Combined with kubeProxyReplacement, lets Cilium
# advertise LB IPs on the LAN via ARP/NDP. Pool + policy live in separate manifests
# so they can be tweaked independently of the chart values.
l2announcements:
  enabled: true
externalIPs:
  enabled: true

# Hubble for observability. Relay aggregates flows; UI is web frontend.
# Expose UI via the Cilium Gateway later; until then, port-forward.
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - http

# Single-stack IPv4 for the homelab. Flip if you go dual-stack.
ipv4:
  enabled: true
ipv6:
  enabled: false

# Operator: 1 replica is enough for homelab. The chart defaults to 2.
operator:
  replicas: 1

# CRDs are baked into the chart and tracked via ServerSideApply (see ApplicationSet syncOptions).
