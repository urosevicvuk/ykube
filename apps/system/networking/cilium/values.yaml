# Cilium values, tuned for k3s on NixOS (firelink).
#
# k3s prerequisites (set in ynix's modules/features/cluster/k3s.nix):
#   --flannel-backend=none       # we install Cilium ourselves
#   --disable-kube-proxy         # Cilium replaces kube-proxy
#   --disable-network-policy     # Cilium enforces policy
#   --disable=servicelb          # Cilium L2 announces LB IPs
#   --disable=traefik            # Gateway API instead
#
# For the future Talos+Proxmox cluster (seed-talos/), k8sServiceHost flips back to
# `localhost:7445` (KubePrism) and the cgroup block stays as-is.
#
# References:
#   - https://docs.cilium.io/en/stable/installation/k8s-install-helm/
#   - https://docs.k3s.io/networking/distributed-multicloud#deploying-cilium

# Use Kubernetes IPAM.
ipam:
  mode: kubernetes

# Native (direct) routing instead of vxlan encapsulation.
#
# Why (2026-06-26): the Cilium Gateway API L7 proxy redirect was completely
# dead on this cluster — a pod (or any origin) hitting the gateway's
# ClusterIP/LB IP/NodePort gets `-> proxy port 15581` in the datapath but the
# SYN never reaches Envoy (0 downstream connections, no drop logged), so every
# request times out. Switching the TPROXY mechanism (iptables -> bpf.tproxy)
# didn't help — the loss is in the to-proxy redirect itself, which carries the
# vxlan-tunnel + socket-LB signature of cilium/cilium#46284. This blocks the
# real ingress model here: cloudflared (pod) and the tailscale-operator proxy
# (pod) both reach services pod->ClusterIP, exactly the broken path.
#
# On a SINGLE node vxlan is pure overhead anyway — every pod is local, there's
# no peer to encapsulate toward — so native routing is both the natural config
# and the change that removes the vxlan leg of the bug.
#
# ipv4NativeRoutingCIDR = the k3s cluster pod CIDR (10.42.0.0/16; this node owns
# 10.42.0.0/24). Traffic inside it is routed natively and NOT masqueraded;
# everything else still gets BPF-masqueraded out eno1. autoDirectNodeRoutes is a
# no-op on one node but is the canonical native-routing companion for when this
# grows to the Talos+3VM cluster (L2-adjacent nodes).
routingMode: native
ipv4NativeRoutingCIDR: 10.42.0.0/16
autoDirectNodeRoutes: true

# Replace kube-proxy entirely.
kubeProxyReplacement: true

# Socket-level load balancer: intercept ClusterIP traffic at the cgroup/socket layer
# (connect/sendmsg) so pod-to-service goes straight to the backend pod IP. Without
# this, traffic falls through to the packet-level path and UDP (notably DNS) flakes
# out — symptom: pods can't resolve cluster.local, Argo apps stuck OutOfSync with
# repo-server DNS timeouts.
#
# hostNamespaceOnly: restrict socket-LB to the host network namespace; pod-side
# Service traffic falls back to tc-level handling. Required for tailscale-operator
# LoadBalancer-class proxies (gateway-internal): they DNAT incoming tailnet traffic
# to a ClusterIP and MASQUERADE the source via in-pod nftables. Without
# hostNamespaceOnly, Cilium's socket-LB bypasses those netfilter hooks at the
# pod's egress socket and the return packets from the Service backend don't match
# the proxy pod's conntrack, so SYN goes out but SYN-ACK never gets back to the
# tailnet client. (See cilium/cilium#17738 for the apiserver-reachability caveat
# in some setups — not affecting this single-node k3s cluster.)
socketLB:
  enabled: true
  hostNamespaceOnly: true

# eBPF masquerade instead of iptables. The iptables masquerade reconciler in
# Cilium 1.19 has a startup bug where it tries to delete a phantom rule from
# OLD_CILIUM_POST_nat, fails with "iptables: Bad rule", and aborts the entire
# reconcile cycle — leaving CILIUM_POST_nat empty. Pods then can't egress to
# the internet (no SNAT), CoreDNS can't forward to upstream DNS, Argo can't
# pull from GitHub. BPF masquerade bypasses iptables for this path entirely.
bpf:
  masquerade: true
  # NOTE: bpf.tproxy was set while trying to make the Cilium L7 gateway work; it's
  # now reverted along with gatewayAPI (disabled 2026-06-27). The whole L7-proxy
  # path is fundamentally broken on this single all-same-node node — see the
  # gatewayAPI note below + memory project_cilium_gateway_l7_broken. L7 lives on
  # Envoy Gateway; Cilium owns L3/L4 + policy + Hubble-L4 here.

  # --- Perf tuning for this box (40 vCPU / 400 GB RAM — favour speed over memory) ---
  # Preallocate BPF maps at full size on startup instead of growing on demand:
  # trades memory for lower, steadier latency (no rehash stalls under load).
  preallocateMaps: true
  # Size CT/NAT/policy maps as a fraction of total RAM (default 0.0025). Bumped so
  # the conntrack + NAT tables are effectively never the bottleneck on this host.
  mapDynamicSizeRatio: 0.005
  # Full per-packet flow visibility in Hubble (default "medium" aggregates flows).
  # We want the richest observability and don't care about the extra trace volume.
  monitorAggregation: none

  # --- Phase 2, needs a NODE REBOOT — enable on its own, after 1.20-pre is healthy ---
  # netkit: replace veth pod devices with netkit for ~host-network datapath perf.
  # Requires kernel >=6.8 (have 7.0) + native routing (have it). Invasive: every
  # pod's netdev is recreated, so expect a dataplane blip. To enable, uncomment:
  # datapathMode: netkit

# ===========================================================================
# Advanced datapath features (2026-06-26, Cilium 1.20.0-pre.3).
# L7 stays on standalone Envoy Gateway; here we turn Cilium up to the best
# L3/L4 datapath this box can run. (Cilium's own L7 proxy/Gateway is still
# wired up + retested on every bump, but Envoy Gateway is the load-bearing L7.)
# ===========================================================================

# EDT-based egress shaping + BBR congestion control for pod traffic. BBR beats
# CUBIC on throughput/latency under load; needs kernel >=5.18 (on 7.0). This is
# the modern eBPF replacement for the tc/HTB shaper.
bandwidthManager:
  enabled: true
  bbr: true

# Local Redirect Policy machinery: lets a CiliumLocalRedirectPolicy steer pod
# traffic to a node-local backend (node-local DNS cache, topology redirects).
# Off by default — enabling it now so LRPs work without another rollout.
localRedirectPolicy: true

# CiliumEndpointSlice: batch endpoint state into slices instead of one
# CiliumEndpoint per pod — much less apiserver/etcd churn at this pod density.
ciliumEndpointSlice:
  enabled: true

# k3s apiserver listens on 6443 on every node (single-node cluster, this is firelink itself).
k8sServiceHost: 127.0.0.1
k8sServicePort: "6443"

# NixOS already mounts cgroup2 — leave Cilium's automount disabled to avoid the same fight
# we had on Talos. NixOS cgroup root path is the same as Talos.
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos requires explicit capability sets — Cilium's defaults assume host-managed cgroups.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Gateway API: DISABLED (2026-06-27). Cilium's L7 proxy has no working entry path
# on this single all-same-node node — it's built for traffic ARRIVING at a node
# from outside (ingress/PREROUTING), and on one node every client (cloudflared,
# tailscale-operator, any pod) originates locally (TX path), where the kernel
# TPROXY socket-steal never fires. Exhaustively proven across LB-VIP+iptables
# TPROXY, bpf_sk_assign, AND host-network mode (TCP connects but bpf_metadata
# stalls), tunnel+native routing, Cilium 1.19.5 AND 1.20.0-pre.3, pod AND host
# origin. Upstream confirms: #36004 (our exact case, open), #46284 (TX-path TPROXY
# limit), #45485 (host-network status bug). L7 stays on standalone Envoy Gateway.
#
# REVISIT on Talos+3VM: gateway in LoadBalancer mode + cloudflared as a DaemonSet
# (mirror okwilkins/h8s) so cross-node ingress paths exist. See memory
# project_cilium_gateway_l7_broken for the full plan.
gatewayAPI:
  enabled: false

# Dedicated cilium-envoy DaemonSet — only needed for Cilium's L7 (Gateway /
# L7 policy), which is disabled here. Off, so no idle Envoy DaemonSet; re-enable
# with gatewayAPI on Talos+3VM.
envoy:
  enabled: false

# L2 announcements replace MetalLB. Combined with kubeProxyReplacement, lets Cilium
# advertise LB IPs on the LAN via ARP/NDP. Pool + policy live in separate manifests
# so they can be tweaked independently of the chart values.
l2announcements:
  enabled: true
externalIPs:
  enabled: true

# Cilium agent + operator self-metrics. kube-prometheus-stack auto-
# discovers ServiceMonitors cluster-wide so flipping these on is the
# whole wiring — Prometheus picks them up on its next reconcile.
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true

# Hubble for observability. Relay aggregates flows; UI is web frontend.
# Expose UI via the Cilium Gateway later; until then, port-forward.
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enableOpenMetrics: true
    # ServiceMonitor for Hubble metrics — same auto-discovery story as
    # Cilium agent. Without this, the metrics endpoint is exposed but
    # Prometheus never scrapes it.
    serviceMonitor:
      enabled: true
    # httpV2 supersedes the old `http` metric set: better histogram
    # buckets, exemplars (jump from metric → trace in Grafana), and
    # source/destination namespace context labels for top-N queries.
    # See https://docs.cilium.io/en/stable/observability/metrics/#hubble-metrics
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:exemplars=true;labelsContext=source_namespace,destination_namespace,source_workload,destination_workload,traffic_direction

operator:
  replicas: 1
  # Operator self-metrics (reconcile loop counters, error rates).
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

# Single-stack IPv4 for the homelab. Flip if you go dual-stack.
ipv4:
  enabled: true
ipv6:
  enabled: false

# CRDs are baked into the chart and tracked via ServerSideApply (see ApplicationSet syncOptions).

# CRDs are baked into the chart and tracked via ServerSideApply (see ApplicationSet syncOptions).
