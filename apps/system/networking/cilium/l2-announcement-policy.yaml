# Cilium L2 announcement policy.
# Tells Cilium to ARP-announce LB IPs on every node's primary interface.
# Without this the LB IPs are assigned but unreachable from the LAN.
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default
  namespace: kube-system
spec:
  # Empty selector → applies to every Service of type=LoadBalancer.
  serviceSelector:
    matchLabels: {}
  # Empty selector → all nodes participate.
  nodeSelector:
    matchLabels: {}
  # Scope to firelink's LAN NIC only. The blanket `^.*$` would also try to
  # ARP on tailscale0 (point-to-point, ARP-unaware), cilium_host (internal),
  # cilium_vxlan, and the dynamic lxc* veth pairs — none of which should
  # announce LB IPs. When multi-NIC Talos VMs join, add their NIC patterns
  # (likely `^ens.+$` or `^enp.+$` depending on hardware).
  interfaces:
    - ^eno1$
  externalIPs: true
  loadBalancerIPs: true
