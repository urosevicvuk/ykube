# Cluster-wide allow rules that the per-namespace default-deny CNPs depend on.
#
# Without these, the default-deny CiliumNetworkPolicy in any tenant namespace
# (e.g. apps/morel/morel/network-policy.yaml) would compose with the system
# pods' selectors and break DNS / control plane traffic. These CCNPs are the
# explicit "system services are always allowed" backstop.
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-kube-dns
spec:
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": kube-system
      "k8s:k8s-app": kube-dns
  ingress:
    - fromEntities:
        - all
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-host-policy
spec:
  endpointSelector:
    matchLabels:
      "reserved:host": ""
  ingress:
    - fromEntities:
        - all
  egress:
    - toEntities:
        - all
