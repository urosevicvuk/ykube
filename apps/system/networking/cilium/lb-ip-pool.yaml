# Cilium LoadBalancer IP pool.
# These IPs get handed out to Services of type=LoadBalancer.
#
# firelink LAN is 192.168.0.0/24. Router DHCP scope: .10-.254. The only
# usable static range is .2-.9 (with .1 = gateway, .33 = node). 8 IPs —
# plenty for the 2-3 LoadBalancer services this cluster owns (envoy-
# external, envoy-internal, future cilium-gateway-internal if migrated).
#
# When moving to Talos+3VMs, also shrink the router's DHCP scope to
# something like .50-.200 and expand this pool to .201-.254 for headroom.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan
  namespace: kube-system
spec:
  blocks:
    - start: 192.168.0.2
      stop: 192.168.0.9
