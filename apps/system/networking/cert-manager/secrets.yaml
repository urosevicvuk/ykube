# Cloudflare API token for cert-manager DNS-01 ACME challenges.
# Same token shape as external-dns/secrets.yaml but a separate kv path so the
# tokens can be rotated independently (and scoped differently if you ever want
# to give external-dns a write-only token).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: cert-manager/cloudflare-api-token
        property: api-token
