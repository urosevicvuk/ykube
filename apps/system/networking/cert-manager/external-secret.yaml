# Cloudflare API token sourced from Vault.
# Vault path: kv/cert-manager/cloudflare-api-token, key `api-token`.
# Provisioned by TF stage 07-vault-resources-provision before ArgoCD takes over.
# Wave 5 — needs the ClusterSecretStore (from external-secrets app) to exist.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: cert-manager/cloudflare-api-token
        property: api-token
