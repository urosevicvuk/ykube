# Two ClusterIssuers: staging for testing (won't blow Let's Encrypt rate limits),
# prod for real certs. Both use Cloudflare DNS-01 so wildcard certs work.
# Wave -10: land before the chart's pods so Certificates issued at wave 0 don't
# stall waiting for the issuer. The cert-manager controller is in the same
# Application — kustomize+Helm renders both, Argo handles ordering by wave.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  acme:
    email: vuk23urosevic@gmail.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  acme:
    email: vuk23urosevic@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
