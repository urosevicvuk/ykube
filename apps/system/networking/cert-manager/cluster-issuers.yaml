# Two ClusterIssuers: staging for testing (won't blow Let's Encrypt rate limits),
# prod for real certs. Both use Cloudflare DNS-01 so wildcard certs work.
# Wave +5: applies AFTER the cert-manager controller (wave 0) is up. Without
# the controller, ClusterIssuer never turns Healthy and Argo's wave gating
# deadlocks the rest of the Application (same trap ESO's ClusterSecretStore hit).
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  acme:
    email: vuk23urosevic@gmail.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  acme:
    email: vuk23urosevic@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
