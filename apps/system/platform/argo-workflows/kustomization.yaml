apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argo-workflows

resources:
  - namespace.yaml
  - cnpg-cluster.yaml
  - httproute.yaml

helmCharts:
  - name: argo-workflows
    repo: https://argoproj.github.io/argo-helm
    version: 0.45.0  # renovate: depName=argo-workflows registryUrl=https://argoproj.github.io/argo-helm
    releaseName: argo-workflows
    namespace: argo-workflows
    valuesFile: values.yaml
    includeCRDs: true
