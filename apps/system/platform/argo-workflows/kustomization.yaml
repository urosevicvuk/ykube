apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argo-workflows

resources:
  - namespace.yaml
  - cnpg-cluster.yaml
  - httproute.yaml

helmCharts:
  - name: argo-workflows
    repo: https://argoproj.github.io/argo-helm
    version: 1.0.18  # renovate: depName=argo-workflows registryUrl=https://argoproj.github.io/argo-helm
    releaseName: argo-workflows
    namespace: argo-workflows
    valuesFile: values.yaml
    includeCRDs: true

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
