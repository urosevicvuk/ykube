# Forgejo token used by the Renovate CronWorkflow to open PRs.
# Generate in Forgejo UI: Settings → Applications → Generate New Token
# with `repo` + `package:read` scopes, then store in Vault:
#   vault kv put kv/renovate/forgejo token=<token>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-forgejo
  namespace: argo-workflows
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: renovate-forgejo
    creationPolicy: Owner
  data:
    - secretKey: RENOVATE_TOKEN
      remoteRef:
        key: renovate/forgejo
        property: token
