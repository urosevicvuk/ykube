# GitHub webhook receiver. Argo Events auto-registers the webhook on each listed
# repo using the API token (needs admin:repo_hook), validates the HMAC signature
# with the shared webhook secret, and emits a `build` event on push.
#
# Reachable from GitHub's internet at https://events.urosevicvuk.dev/push via
# cloudflared → gateway-external → this EventSource's service (port 12000). That
# tunnel is also what makes inbound webhooks work at all behind CGNAT.
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github
  namespace: argo-workflows
spec:
  eventBusName: default
  service:
    ports:
      - port: 12000
        targetPort: 12000
  github:
    build:
      repositories:
        - owner: urosevicvuk
          names:
            - morel-website
      webhook:
        endpoint: /push
        port: "12000"
        method: POST
        url: https://events.urosevicvuk.dev
      events:
        - push
      apiToken:
        name: github-eventsource
        key: token
      webhookSecret:
        name: github-eventsource
        key: webhook-secret
      contentType: json
      active: true
      insecure: false
