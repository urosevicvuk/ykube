apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Generic build-and-push WorkflowTemplate + the creds it needs (Harbor push, git
# clone, GitHub EventSource), plus the GitHub push→build trigger (EventSource +
# Sensor + public webhook route). Manual use: `argo submit --from` (see
# workflowtemplate.yaml). Auto: push to a wired repo's main branch.
resources:
  - secrets.yaml
  - workflowtemplate.yaml
  - eventsource.yaml
  - sensor.yaml
  - httproute.yaml
