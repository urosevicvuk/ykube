# Harbor robot-account creds → dockerconfigjson that `buildctl` uses to push.
# Populate in Vault:
#   kv/harbor-ci/robot: { username, password }
#
# Create the robot in Harbor (a project robot, or a system robot scoped to the
# projects you build into) with push+pull permission. Its username looks like
# `robot$ci` or `robot$project+ci`. ESO renders the docker config below; the
# built secret only contains .dockerconfigjson (the consumer-read field), so
# creationPolicy Owner is safe.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-push
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-push
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"registry.urosevicvuk.dev":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: harbor-ci/robot
        property: username
    - secretKey: password
      remoteRef:
        key: harbor-ci/robot
        property: password
---
# GitHub PAT used to clone SOURCE repos being built (handed to BuildKit as
# GIT_AUTH_TOKEN). Populate in Vault:
#   kv/ci-build/github: { token }
#
# Needs read access to the repos you build — your own, plus any friend's private
# repo you've been granted access to. A fine-grained PAT scoped to Contents:Read
# on those repos is ideal. Kept separate from the Renovate token (different blast
# radius); point both at the same Vault entry if you really want to share one.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: build-git-auth
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: build-git-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: ci-build/github
        property: token
---
# Credentials for the GitHub EventSource (eventsource.yaml): an API token to
# auto-register the repo webhook (needs admin:repo_hook), plus the shared HMAC
# secret used to validate inbound deliveries. Populate in Vault:
#   kv/ci-build/github-eventsource: { token, webhook-secret }
# webhook-secret is any random string you also paste into GitHub if you ever
# register the hook manually; with auto-registration Argo Events sets it for you.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-eventsource
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: github-eventsource
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: ci-build/github-eventsource
        property: token
    - secretKey: webhook-secret
      remoteRef:
        key: ci-build/github-eventsource
        property: webhook-secret

