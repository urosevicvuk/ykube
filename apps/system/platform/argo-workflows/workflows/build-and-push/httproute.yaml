# Publicly exposes the GitHub EventSource so github.com can deliver webhooks.
# Matches the *.urosevicvuk.dev listener on gateway-external; external-dns +
# cloudflared (configured on the Gateway) make it reachable from the internet
# despite CGNAT. The EventSource auto-creates a Service named
# `<eventsource>-eventsource-svc`.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-events
  namespace: argo-workflows
spec:
  parentRefs:
    - name: gateway-external
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - events.urosevicvuk.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /push
      backendRefs:
        - name: github-eventsource-svc
          port: 12000
          group: ""
          kind: Service
          weight: 1
