# Self-hosted Renovate — replaces the Mend hosted GitHub App. Runs nightly as
# an Argo CronWorkflow in the argo-workflows namespace (the only namespace the
# controller watches today, and where the `argo-workflow` SA + executor RBAC
# already exist). This is intentionally the first *real* Workflow on the
# cluster — proving the engine out before the generic build-and-push template.
#
# Renovate reads the per-repo config from urosevicvuk/ykube's renovate.json;
# this CronWorkflow only supplies platform/token/repo scope via env. No artifact
# repo needed (single container, no cross-step artifacts) — so it runs fine
# without the deferred object storage.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: renovate
  namespace: argo-workflows
spec:
  schedule: "0 2 * * *" # nightly 02:00 Belgrade
  timezone: Europe/Belgrade
  concurrencyPolicy: Forbid # never overlap runs
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    serviceAccountName: argo-workflow
    entrypoint: renovate
    activeDeadlineSeconds: 3600 # kill a run that wedges past an hour
    ttlStrategy:
      secondsAfterCompletion: 86400 # keep finished workflow 24h for the UI
    podGC:
      strategy: OnWorkflowSuccess
    templates:
      - name: renovate
        container:
          image: renovate/renovate:43.249.3
          env:
            - name: RENOVATE_PLATFORM
              value: github
            - name: RENOVATE_AUTODISCOVER
              value: "false"
            - name: RENOVATE_REPOSITORIES
              value: urosevicvuk/ykube
            - name: RENOVATE_ONBOARDING
              value: "false" # repo already has renovate.json
            - name: LOG_LEVEL
              value: info
            - name: RENOVATE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: renovate-github
                  key: token
            - name: GITHUB_COM_TOKEN # reused for github-releases / changelogs
              valueFrom:
                secretKeyRef:
                  name: renovate-github
                  key: token
          # No CPU limit (avoids throttling); memory bounded so a runaway
          # clone can't OOM the node.
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 3Gi
