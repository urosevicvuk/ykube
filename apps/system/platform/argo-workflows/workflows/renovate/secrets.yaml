# GitHub PAT for self-hosted Renovate. Populate in Vault:
#   kv/renovate-system/github: { token }
#
# token = a GitHub PAT on urosevicvuk/ykube with permission to open PRs:
#   - classic:        `repo` scope
#   - fine-grained:   Contents + Pull requests = Read/Write on the repo
# The same token is reused as GITHUB_COM_TOKEN so release-note / github-releases
# lookups aren't rate-limited (see renovate-cronworkflow.yaml).
#
# After this lands, DISABLE the Mend Renovate GitHub App on the repo to avoid
# duplicate PRs — this self-hosted runner replaces it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-github
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: renovate-github
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: renovate-system/github
        property: token
