# Forgejo Helm values. Vanilla operational deploy: admin user from Vault,
# Postgres from CNPG, repos on Longhorn. HTTPS push/pull via the Gateway.
# SSH disabled (TCP needs the VPS+WG frontend — separate task).

# Bitnami moved to "Bitnami Secure Images" in 2025/2026 and the bundled
# redis sub-chart now refuses to render with any non-BSI image (returns
# "Unrecognized images: ..." and exits 1 from helm template). We use
# `bitnamilegacy/redis` (their own legacy archive registry) because the
# BSI images require a subscription. Setting allowInsecureImages bypasses
# the chart's hard-block, the image still works fine — it's literally the
# same binary Bitnami built last year.
global:
  security:
    allowInsecureImages: true

redis-cluster:
  enabled: false

# Use CNPG cluster instead of the in-chart Postgres.
postgresql:
  enabled: false

postgresql-ha:
  enabled: false

# In-chart Redis stands in as a cache backend; persistence off (cache only).
#
# Bitnami archived their old image tags into `docker.io/bitnamilegacy/...`
# in 2025/2026. The forgejo 12.0.0 sub-chart pins
# `docker.io/bitnami/redis:7.4.2-debian-12-r6`, which now 404s on pull —
# `failed to resolve reference`. Override the repository to the legacy
# registry; the same exact tag still exists there.
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
  master:
    persistence:
      enabled: false

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi
  accessModes: [ReadWriteOnce]

gitea:
  admin:
    existingSecret: forgejo-admin

  # DB password from CNPG-generated secret (forgejo-pg-app).
  additionalConfigFromEnvs:
    - name: GITEA__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: forgejo-pg-app
          key: password

  config:
    server:
      DOMAIN: git.urosevicvuk.dev
      ROOT_URL: https://git.urosevicvuk.dev
      DISABLE_SSH: true
      OFFLINE_MODE: false
    database:
      DB_TYPE: postgres
      HOST: forgejo-pg-rw.forgejo:5432
      NAME: forgejo
      USER: forgejo
    cache:
      ENABLED: true
      ADAPTER: redis
      HOST: redis://forgejo-redis-master:6379/0
    session:
      PROVIDER: redis
      PROVIDER_CONFIG: redis://forgejo-redis-master:6379/0
    queue:
      TYPE: redis
      CONN_STR: redis://forgejo-redis-master:6379/0
    service:
      DISABLE_REGISTRATION: true   # admin invites only — multi-tenant hygiene

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 22

# Don't deploy ingress; Gateway API HTTPRoute does the work.
ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 1Gi
