# CloudNative-PG Cluster for Forgejo's database.
# CNPG generates the app user secret automatically (forgejo-pg-app); Forgejo
# reads it via Helm values (existing database settings below).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-pg
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  monitoring:
    enablePodMonitor: true
