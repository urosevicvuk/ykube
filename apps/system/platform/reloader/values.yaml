# Stakater Reloader — restart pods on ConfigMap/Secret changes.
# Global auto mode: every workload that references a ConfigMap/Secret
# (via envFrom, valueFrom, or volume mount) is reloaded when that object's
# content changes — no per-workload annotation needed.
# Opt a workload OUT with `reloader.stakater.com/auto: "false"`.
reloader:
  watchGlobally: true
  autoReloadAll: true
  reloadStrategy: annotations  # bump a pod-template annotation to trigger rollout (no env-var injection)
  readOnlyRootFileSystem: true
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
