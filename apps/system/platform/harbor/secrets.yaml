# All ExternalSecrets for Harbor. Wave -10 — materialize before the chart's
# pods boot. Harbor's chart wants HARBOR_ADMIN_PASSWORD + the registry/core/
# jobservice signing secrets present at startup.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-admin
    creationPolicy: Owner
  data:
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef:
        key: harbor/admin
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-registry-secret
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-registry-secret
    creationPolicy: Owner
  data:
    - secretKey: REGISTRY_HTTP_SECRET
      remoteRef:
        key: harbor/registry-secret
        property: secret
    - secretKey: CORE_SECRET
      remoteRef:
        key: harbor/registry-secret
        property: core
    - secretKey: JOBSERVICE_SECRET
      remoteRef:
        key: harbor/registry-secret
        property: jobservice
