# Grafana Alloy as a DaemonSet — pod-log scrape + Kubernetes events → Loki,
# plus OTLP receiver → Tempo for traces emitted by app pkg/otelinit
# (and by Faro from the browser).
# Replaces legacy Promtail (deprecated in Loki 3.x).
#
# PSS on the namespace is `privileged` because Alloy needs hostPath access to
# /var/log/pods. This is the standard pattern — Alloy is system infra, not a
# tenant workload.

controller:
  type: daemonset

alloy:
  configMap:
    create: true
    content: |-
      logging {
        level  = "info"
        format = "logfmt"
      }

      // === Pod log discovery ===
      // TODO(phase6): migrate to loki.source.podlogs driven by
      // monitoring.grafana.com/v1alpha2 PodLogs CRs so tenants opt
      // into log shipping per-namespace (analogous to PodMonitor).
      // Requires the alloy-operator subchart to install the CRD.
      // Current discovery.kubernetes pulls every pod's logs, which is
      // fine for the small cluster but doesn't scale to multi-tenant.
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.dropnoise.receiver]
      }

      // Drop noisy kubelet probe access logs (nginx logs every GET /
      // from kube-probe — 3 replicas × every 5s = ~36 lines/min/svc
      // that are pure noise). Filter by the kube-probe User-Agent
      // signature in the raw line. Other services' access logs that
      // happen to mention the string survive — the User-Agent is
      // quoted in the standard combined format so false matches are
      // unlikely.
      loki.process "dropnoise" {
        forward_to = [loki.write.default.receiver]
        stage.drop {
          expression          = ".*\"kube-probe/[^\"]+\".*"
          drop_counter_reason = "kube_probe_health_check"
        }
      }

      // === Cluster events → Loki (so you can correlate pod crashes, scheduling, etc.) ===
      loki.source.kubernetes_events "events" {
        log_format = "logfmt"
        forward_to = [loki.write.default.receiver]
      }

      // === OTLP receivers for app traces (and Faro from the browser) ===
      // App services point OTEL_EXPORTER_OTLP_ENDPOINT at
      // http://alloy.alloy.svc:4317 (kube-side) and Faro pushes to the
      // externally-exposed HTTP endpoint (port 4318 via HTTPRoute).
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
          // CORS for Faro — the frontend origin must be permitted to
          // POST OTLP from the browser. Wildcard works because the
          // Faro auth model is "trust whatever the user sends" anyway
          // (it's RUM, not credentialed).
          cors {
            allowed_origins = ["*"]
            allowed_headers = ["*"]
          }
        }
        output {
          traces  = [otelcol.processor.batch.default.input]
          metrics = [otelcol.processor.batch.default.input]
          logs    = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        send_batch_size = 1024
        timeout         = "1s"
        output {
          traces  = [otelcol.exporter.otlp.tempo.input]
          // Metrics arriving via OTLP push (currently nothing — the Go
          // services expose Prometheus pull at /metrics, Faro doesn't
          // push metrics by default) get dropped on the floor since
          // there's no metrics exporter wired. Add otelcol.exporter.prometheus
          // here if we ever need push-mode metrics.
          metrics = []
          logs    = [otelcol.exporter.loki.default.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.tempo.svc:4317"
          tls {
            insecure = true
          }
        }
      }

      // Faro web events come in as OTLP logs; route them to Loki so
      // they surface alongside backend logs in Grafana Explore.
      otelcol.exporter.loki "default" {
        forward_to = [loki.write.default.receiver]
      }

      // === Output ===
      loki.write "default" {
        endpoint {
          url = "http://loki.loki:3100/loki/api/v1/push"
        }
        external_labels = {
          cluster = "firelink",
        }
      }

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Expose the OTLP receiver ports on the Alloy Service so app pods
  # can dial alloy.alloy.svc:4317. By default the chart only exposes
  # 12345 (HTTP UI).
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

# Run as root because /var/log/pods is owned by root on most distros (including
# k3s on NixOS). The privileged PSS on the alloy namespace allows it.
alloy.securityContext: |
  runAsUser: 0
  runAsGroup: 0

serviceMonitor:
  enabled: true
