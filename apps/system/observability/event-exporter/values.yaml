# kubernetes-event-exporter — ships kubectl events to Loki so OOMKilled /
# FailedScheduling / Unhealthy / FailedMount etc. become searchable and
# alertable like any other log stream.
#
# Sends to Loki's HTTP push API at /loki/api/v1/push with labels that line
# up with what Alloy is already shipping (namespace, severity), so Grafana
# joins work out of the box.

# Run as a Deployment (single replica is fine — it watches the API server
# event stream which is itself persisted, not the per-node /var/log/pods).
replicaCount: 1

# Bitnami's chart ships images at `bitnami/kubernetes-event-exporter:<app>-debian-12-rXX`
# and rotates the rXX suffix; old tags eventually disappear from Docker Hub
# and pods land in ImagePullBackOff. Pin to upstream resmoio image — same
# binary, stable tags.
image:
  registry: ghcr.io
  repository: resmoio/kubernetes-event-exporter
  # Upstream uses MAJOR.MINOR scheme (v1.7), not MAJOR.MINOR.PATCH;
  # bitnami's chart pinned an `1.7.0` that doesn't exist upstream.
  tag: v1.7
  pullPolicy: IfNotPresent

# Bitnami's chart hard-rejects "non-standard" images via a template-rendered
# NOTES.txt error. Opt out — we know what we're pointing at.
global:
  security:
    allowInsecureImages: true

config:
  logLevel: info
  logFormat: json
  # Cluster name shows up as a Loki label so multi-cluster Grafana setups
  # can filter. We only have one cluster today but it's free hygiene.
  clusterName: firelink

  receivers:
    - name: loki
      loki:
        streamLabels:
          source: kubernetes-event-exporter
          cluster: firelink
        url: http://loki.loki:3100/loki/api/v1/push
        # Loki labels per event — keep cardinality reasonable (no event
        # name / uid in labels, those go in the log line body).
        labels:
          namespace: "{{ .Namespace }}"
          severity: "{{ .Type }}"        # Normal | Warning
          reason: "{{ .Reason }}"
          kind: "{{ .InvolvedObject.Kind }}"

    # High-signal failures also fan out to ntfy (phone push). The full event
    # firehose still goes to Loki above; this receiver is narrowed by the
    # Warning route below. event-exporter marshals `layout` to JSON itself, so
    # no manual escaping is needed; ntfy reads the topic from the body.
    - name: ntfy
      webhook:
        endpoint: http://ntfy.ntfy.svc.cluster.local/
        headers:
          Content-Type: application/json
        layout:
          topic: k8s-events
          title: "{{ .Reason }}: {{ .InvolvedObject.Kind }}/{{ .InvolvedObject.Name }}"
          message: "{{ .Message }}"
          priority: 4
          tags:
            - warning

  route:
    # Catch-all sends every event to Loki. Filter at query time in Grafana /
    # Loki rules, not at ship time — keeps the firehose available for
    # unexpected investigations.
    routes:
      - match:
          - receiver: loki
      # Only genuinely-actionable Warnings page the phone. Broaden the reason
      # regex to taste — Unhealthy/FailedScheduling are noisy on a single node,
      # so they're intentionally left out.
      - match:
          - type: Warning
            reason: "(OOMKilling|Evicted|BackOff|FailedMount|FailedAttachVolume|ErrImagePull|ImagePullBackOff|FailedCreatePodSandBox)"
            receiver: ntfy
