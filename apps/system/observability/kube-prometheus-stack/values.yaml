# kube-prometheus-stack — Prometheus + Grafana + Alertmanager + node-exporter
# + kube-state-metrics + the operator. Single replica everywhere (single node).
#
# Grafana datasource for Loki is pre-provisioned; logs live in the loki namespace.

crds:
  enabled: true

defaultRules:
  create: true

# === Prometheus ===
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 30d
    retentionSize: 18GiB
    # Auto-discover ServiceMonitors / PodMonitors / PrometheusRules cluster-wide.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi
  service:
    type: ClusterIP

# === Alertmanager ===
alertmanager:
  alertmanagerSpec:
    replicas: 1
    # Discover AlertmanagerConfig CRs from every namespace (empty
    # selectors = match-all). Tenant namespaces author their own
    # routing this way — e.g. raf-banka ships a Discord receiver in
    # Banka-3-Infrastructure/monitoring/alertmanagerconfig.yaml.
    # Chart default is alertmanagerConfigSelectorNilUsesHelmValues=true,
    # where nil means match-nothing — that's why we set these explicitly.
    # Matcher strategy is OnNamespace (operator default), which auto-
    # scopes each AC's routes to alerts from that AC's own namespace.
    alertmanagerConfigSelector: {}
    alertmanagerConfigNamespaceSelector: {}
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
  service:
    type: ClusterIP

# === Grafana ===
grafana:
  replicas: 1
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Europe/Belgrade

  # admin user/password from ESO (kv/grafana/admin)
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    type: pvc
    storageClassName: longhorn
    accessModes: [ReadWriteOnce]
    size: 5Gi

  grafana.ini:
    server:
      root_url: https://dashboard.urosevicvuk.dev
      serve_from_sub_path: false
    auth.anonymous:
      enabled: false
    security:
      cookie_secure: true

  service:
    type: ClusterIP

  # Delete the orphaned Loki datasource that an earlier Grafana boot
  # created with an auto-generated UID (P8E…), before provisioning re-
  # adds it from additionalDataSources below. Without this, the
  # mismatched UID makes provisioning error out with
  #   "Failed to provision data sources: data source not found"
  # and Tempo (declared after Loki) never gets provisioned either.
  # Safe to leave in place — once Loki exists with the correct UID,
  # this deletion + recreation is a no-op on every startup.
  deleteDatasources:
    - name: Loki
      orgId: 1

  # Pre-provision Loki + Tempo as Grafana datasources. Loki ships in
  # the `loki` namespace, Tempo in `tempo`. The tracesToLogsV2 +
  # tracesToMetrics + nodeGraph wiring is what makes Grafana's Trace
  # view show "logs for this trace" and the service-graph tab.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      uid: loki
      url: http://loki.loki:3100
      jsonData:
        maxLines: 1000
        # Click a log line that includes a traceID → jump to Tempo.
        derivedFields:
          - name: TraceID
            matcherRegex: "trace_id=(\\w+)"
            url: "$${__value.raw}"
            datasourceUid: tempo
    - name: Tempo
      type: tempo
      access: proxy
      uid: tempo
      url: http://tempo.tempo:3100
      jsonData:
        # Click a span → search Loki for matching service.name within the span's time window.
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-5m"
          spanEndTimeShift: "5m"
          filterByTraceID: true
          tags:
            - key: service.name
              value: app
        # Click a span → jump to the RED metrics generated by Tempo's metrics-generator.
        tracesToMetrics:
          datasourceUid: prometheus
          tags:
            - key: service.name
              value: service
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        search:
          hide: false
        lokiSearch:
          datasourceUid: loki

  serviceMonitor:
    enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# === Operator ===
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# === Exporters ===
nodeExporter:
  enabled: true

kube-state-metrics:
  enabled: true

# k3s embeds controller-manager + scheduler + etcd in the apiserver process;
# the separate ServiceMonitors that target them as standalone services fail
# on k3s. Disable those scrapes; metrics still surface via the apiserver scrape.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false  # Cilium replaces kube-proxy
