apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-prometheus-stack

resources:
  - namespace.yaml
  - secrets.yaml
  - httproute-grafana.yaml
  - httproute-prometheus.yaml
  - httproute-alertmanager.yaml
  - alertmanager-config.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 84.5.0  # renovate: depName=prometheus-community/kube-prometheus-stack
    releaseName: kube-prometheus-stack
    namespace: kube-prometheus-stack
    valuesFile: values.yaml
    includeCRDs: true

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
