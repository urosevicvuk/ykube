apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tempo

resources:
  - namespace.yaml

helmCharts:
  - name: tempo
    repo: https://grafana.github.io/helm-charts
    version: 1.24.4  # renovate: depName=grafana/tempo
    releaseName: tempo
    namespace: tempo
    valuesFile: values.yaml
    includeCRDs: true

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
