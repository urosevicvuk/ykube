apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tempo

resources:
  - namespace.yaml

helmCharts:
  - name: tempo
    repo: https://grafana.github.io/helm-charts
    version: 1.23.3  # renovate: depName=grafana/tempo
    releaseName: tempo
    namespace: tempo
    valuesFile: values.yaml
    includeCRDs: true
