apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: loki

resources:
  - namespace.yaml

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 7.0.0  # renovate: depName=grafana/loki
    releaseName: loki
    namespace: loki
    valuesFile: values.yaml
    includeCRDs: true
