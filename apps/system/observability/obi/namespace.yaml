apiVersion: v1
kind: Namespace
metadata:
  name: obi
  labels:
    # OBI needs hostPID/hostNetwork + privileged to attach eBPF probes
    # across every container's net/pid namespace. Privileged PSS is the
    # standard for system-level eBPF agents (same pattern as Cilium).
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
