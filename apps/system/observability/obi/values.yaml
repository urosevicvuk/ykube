# OpenTelemetry eBPF Instrumentation (OBI) — the donated/renamed Grafana
# Beyla project. DaemonSet that attaches eBPF probes to network/syscall
# hooks per node and emits OTLP traces + Prometheus metrics for any
# HTTP/HTTPS/HTTP2/gRPC/SQL/Redis traffic between pods. Zero app changes.
#
# What you get for free once this is running:
#   - RED metrics (Rate/Errors/Duration) per service in Prometheus
#   - Span data in Tempo with namespace/pod/container labels auto-applied
#   - Grafana service graph populated by Tempo's metricsGenerator
#
# Bumps to GA later in 2026; pinned to 0.9.2 (chart) / v0.9.0 (app) for now.

config:
  create: true
  data:
    log_level: info

    # Auto-classify route patterns from observed traffic (so Tempo's
    # service map doesn't blow up to one node per unique path).
    routes:
      unmatched: heuristic

    # Auto-attribute every span with kubernetes namespace/pod/container/
    # node — joins with kube-state-metrics labels in Grafana.
    attributes:
      kubernetes:
        enable: true

    # OTLP destinations. Tempo accepts OTLP/gRPC on 4317. Forwarding
    # metrics to Alloy (which already does OTLP→Prometheus) keeps OBI
    # off the Prometheus remote_write path and lets Alloy own the shape.
    otel_traces_export:
      endpoint: http://tempo.tempo:4317
      protocol: grpc
    otel_metrics_export:
      endpoint: http://alloy.alloy:4318
      protocol: http/protobuf

    # Skip self + observability infra so we don't trace our tracing.
    filter:
      network:
        k8s_dst_owner_name:
          not_match: '{kube*,*alloy*,*loki*,*tempo*,*prometheus*,*pyroscope*,*grafana*,obi*}'
        k8s_src_owner_name:
          not_match: '{kube*,*alloy*,*loki*,*tempo*,*prometheus*,*pyroscope*,*grafana*,obi*}'

    # Internal /metrics endpoint Prometheus scrapes (OBI's own health).
    prometheus_export:
      port: 9090
      path: /metrics

# eBPF needs privileged + host PID/network. Required, not negotiable.
privileged: true

# Lifecycle priority: should keep running through evictions like Cilium.
priorityClassName: system-node-critical

# Self-metrics ServiceMonitor for kube-prometheus-stack to pick up.
serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 100m
    # eBPF maps + protocol decoders need real memory. 512Mi OOM'd
    # immediately during startup (exit 137). 1Gi is the floor for OBI
    # in production-ish workloads; we have headroom on a single node.
    memory: 512Mi
  limits:
    memory: 2Gi
