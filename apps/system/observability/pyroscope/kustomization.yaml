apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pyroscope

resources:
  - namespace.yaml

helmCharts:
  - name: pyroscope
    repo: https://grafana.github.io/helm-charts
    version: 2.1.1  # renovate: depName=grafana/pyroscope
    releaseName: pyroscope
    namespace: pyroscope
    valuesFile: values.yaml

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: system
      app.kubernetes.io/managed-by: argocd
