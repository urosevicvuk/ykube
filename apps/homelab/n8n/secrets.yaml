# N8N_ENCRYPTION_KEY persists encryption of credentials in the DB. If this
# rotates, every stored credential becomes unreadable — generate once and
# treat as forever:
#   vault kv put kv/n8n/encryption key="$(openssl rand -hex 32)"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-encryption
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: n8n-encryption
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: N8N_ENCRYPTION_KEY
      remoteRef:
        key: n8n/encryption
        property: key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
