# ExternalSecret for Vaultwarden's admin panel token. Wave -10 — materialize
# before the chart's pods boot. The CNPG-generated DB secret (`vaultwarden-pg-app`)
# is created automatically by the operator and doesn't need an ExternalSecret.
#
# Populate in Vault under kv/vaultwarden/admin with key `token`. Generate the
# token value via `docker run --rm vaultwarden/server /vaultwarden hash` and
# store the resulting `$argon2id$...` string.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-admin
  namespace: vaultwarden
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vaultwarden-admin
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: vaultwarden/admin
        property: token
