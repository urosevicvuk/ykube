apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vaultwarden

resources:
  - namespace.yaml
  # Tenant guardrails (quota/limit/netpol) disabled while we stabilize.
  # - resource-quota.yaml
  # - limit-range.yaml
  # - network-policy.yaml
  - cnpg-cluster.yaml
  - secrets.yaml
  - httproute.yaml

helmCharts:
  - name: vaultwarden
    repo: https://guerzon.github.io/vaultwarden
    version: 0.38.0  # renovate: depName=vaultwarden registryUrl=https://guerzon.github.io/vaultwarden
    releaseName: vaultwarden
    namespace: vaultwarden
    valuesFile: values.yaml
