apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vaultwarden

resources:
  - namespace.yaml
  - cnpg-cluster.yaml
  - secrets.yaml
  - httproute.yaml

helmCharts:
  - name: vaultwarden
    repo: https://guerzon.github.io/vaultwarden
    version: 0.43.0  # renovate: depName=vaultwarden registryUrl=https://guerzon.github.io/vaultwarden
    releaseName: vaultwarden
    namespace: vaultwarden
    valuesFile: values.yaml

# Stamp recommended k8s labels on every rendered resource.
# Uses `labels:` (not deprecated `commonLabels:`) with includeSelectors=false so
# selector matchLabels are untouched — required because Deployment selectors are
# immutable post-creation.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: homelab
      app.kubernetes.io/managed-by: argocd
