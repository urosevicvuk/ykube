# Twenty's APP_SECRET signs JWTs and tokens. Populate in Vault:
#   kv/twenty/secrets:
#     app-secret: <openssl rand -base64 32>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: twenty-secrets
  namespace: twenty-crm
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: twenty-secrets
    creationPolicy: Owner
  data:
    - secretKey: APP_SECRET
      remoteRef:
        key: twenty/secrets
        property: app-secret
