# Immich expects vectorchord 0.4.x on Postgres 14 (matches the upstream
# `ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0` image but
# packaged for CNPG by tensorchord). Newer vectorchord majors are not
# schema-compatible — do not bump to 1.x without Immich also accepting the
# newer extension.
#
# vchord and vectors must be in shared_preload_libraries — the image bundles
# the .so files but Postgres still needs to be told to load them at startup,
# otherwise `CREATE EXTENSION vchord` fails with
# "vchord must be loaded via shared_preload_libraries".
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
  namespace: immich
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:14-0.4.3
  postgresql:
    shared_preload_libraries:
      - vchord.so
      - vectors.so
  storage:
    size: 20Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: immich
      owner: immich
      postInitSQL:
        - "ALTER USER immich WITH SUPERUSER;"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  monitoring:
    enablePodMonitor: true
