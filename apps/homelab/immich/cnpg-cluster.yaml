# Immich v1.x expects vectorchord 0.4.x on Postgres 14 (matches the upstream
# `ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0` image but
# packaged for CNPG by tensorchord). Newer vectorchord majors are not
# schema-compatible with Immich migrations — do not bump to 1.x without
# Immich also being on v2+ and accepting the newer extension.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
  namespace: immich
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:14-0.4.3
  storage:
    size: 20Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: immich
      owner: immich
      postInitSQL:
        - "ALTER USER immich WITH SUPERUSER;"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  monitoring:
    enablePodMonitor: true
