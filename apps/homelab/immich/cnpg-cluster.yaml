# Immich expects vectorchord 0.4.x on Postgres 14 (matches the upstream
# `ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0` image but
# packaged for CNPG by tensorchord). Newer vectorchord majors are not
# schema-compatible — do not bump to 1.x without Immich also accepting the
# newer extension.
#
# vchord must be in shared_preload_libraries — the image bundles the .so
# but Postgres still needs to load it at startup, otherwise `CREATE EXTENSION
# vchord` fails with "vchord must be loaded via shared_preload_libraries".
# Note: this image bundles ONLY vectorchord (vchord), not pgvectors (vectors).
# Immich's own postgres image bundles both, but Immich v2 with
# DB_VECTOR_EXTENSION=vectorchord only requires vchord.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
  namespace: immich
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:14-0.4.3
  postgresql:
    shared_preload_libraries:
      - vchord.so
  storage:
    size: 20Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: immich
      owner: immich
      postInitSQL:
        - "ALTER USER immich WITH SUPERUSER;"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
  monitoring:
    enablePodMonitor: true
