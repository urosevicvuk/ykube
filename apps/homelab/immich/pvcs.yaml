# Library volume — all photos, thumbnails, encoded video, profile images.
# Starts at 100Gi to fit current Longhorn schedulable budget (~113Gi free
# after raf-banka/harbor/etc. reservations). Longhorn supports online expansion —
# raise this number once you've freed disk elsewhere or added a Longhorn disk.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: immich
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
# Separate cache PVC for the ML server (model files).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-ml-cache
  namespace: immich
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
