# Cache for Immich (queue + session). Provisioned by the Dragonfly Operator
# (apps/system/storage/dragonfly-operator/). Service name matches the previous
# hand-rolled Redis Service so immich pods' REDIS_HOST=immich-redis is unchanged.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: immich-redis
  namespace: immich
spec:
  replicas: 1
  args:
    - "--proactor_threads=1"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
