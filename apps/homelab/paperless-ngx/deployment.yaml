apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx
spec:
  replicas: 1
  strategy:
    type: Recreate   # ReadWriteOnce PVCs prevent rolling update
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx
    spec:
      securityContext:
        fsGroup: 1000
      automountServiceAccountToken: false
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PAPERLESS_URL
              value: https://docs.urosevicvuk.dev
            - name: PAPERLESS_PORT
              value: "8000"
            - name: PAPERLESS_REDIS
              value: redis://paperless-redis:6379
            - name: PAPERLESS_DBENGINE
              value: postgresql
            - name: PAPERLESS_DBHOST
              value: paperless-ngx-pg-rw.paperless-ngx
            - name: PAPERLESS_DBPORT
              value: "5432"
            - name: PAPERLESS_DBNAME
              value: paperless
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-pg-app
                  key: username
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-pg-app
                  key: password
            - name: PAPERLESS_OCR_LANGUAGE
              value: eng+srp
            # Image ships eng only; PAPERLESS_OCR_LANGUAGES tells the entrypoint
            # to apt-install the listed tesseract language packs on startup.
            - name: PAPERLESS_OCR_LANGUAGES
              value: "eng srp"
            - name: PAPERLESS_TIME_ZONE
              value: Europe/Belgrade
            - name: USERMAP_UID
              value: "1000"
            - name: USERMAP_GID
              value: "1000"
          envFrom:
            - secretRef:
                name: paperless-admin
          volumeMounts:
            - name: consume
              mountPath: /usr/src/paperless/consume
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx
spec:
  selector:
    app.kubernetes.io/name: paperless-ngx
  ports:
    - name: http
      port: 8000
      targetPort: http
