# Cache for Paperless (celery broker + cache). Provisioned by the Dragonfly
# Operator. Broker state is lossy by design — celery just re-enqueues on
# restart — so no persistence config needed. Service name matches the previous
# hand-rolled one so paperless config (REDIS_HOST=paperless-redis) is unchanged.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: paperless-redis
  namespace: paperless-ngx
spec:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
