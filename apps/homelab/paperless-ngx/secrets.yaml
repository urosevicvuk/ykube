# Admin credentials + Django secret key for Paperless. Populate in Vault:
#   kv/paperless-homelab/admin: { username, password, email, secret-key }
# Generate secret-key via: openssl rand -base64 64 | tr -d '\n'
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-admin
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: paperless-admin
    creationPolicy: Owner
  data:
    - secretKey: PAPERLESS_ADMIN_USER
      remoteRef:
        key: paperless-homelab/admin
        property: username
    - secretKey: PAPERLESS_ADMIN_PASSWORD
      remoteRef:
        key: paperless-homelab/admin
        property: password
    - secretKey: PAPERLESS_ADMIN_MAIL
      remoteRef:
        key: paperless-homelab/admin
        property: email
    - secretKey: PAPERLESS_SECRET_KEY
      remoteRef:
        key: paperless-homelab/admin
        property: secret-key
