# Default-deny + explicit-allow for the excalidraw namespace.
# No outbound to the internet needed — excalidraw is a static web app.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tenant-baseline
  namespace: excalidraw
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": excalidraw
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": gateway
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-prometheus-stack
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": excalidraw
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
