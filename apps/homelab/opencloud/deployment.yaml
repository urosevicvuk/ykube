apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencloud
  namespace: opencloud
  labels:
    app.kubernetes.io/name: opencloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: opencloud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencloud
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opencloud
          image: docker.io/opencloudeu/opencloud-rolling:7.3.0
          command:
            - sh
            - -c
            - "opencloud init || true; opencloud server"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
          env:
            - name: OC_URL
              value: https://cloud.urosevicvuk.dev
            - name: OC_INSECURE
              value: "true"
            - name: PROXY_HTTP_ADDR
              value: 0.0.0.0:9200
            - name: PROXY_TLS
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /etc/opencloud
            - name: data
              mountPath: /var/lib/opencloud
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: opencloud-config
        - name: data
          persistentVolumeClaim:
            claimName: opencloud-data
---
apiVersion: v1
kind: Service
metadata:
  name: opencloud
  namespace: opencloud
  labels:
    app.kubernetes.io/name: opencloud
spec:
  selector:
    app.kubernetes.io/name: opencloud
  ports:
    - name: http
      port: 9200
      targetPort: http
