# Cache for Ghostfolio. Provisioned by the Dragonfly Operator.
# Ghostfolio v3 REQUIRES Redis auth — Dragonfly reads the password from the
# same Secret the app reads, so the two endpoints can't disagree.
# Service name matches the previous hand-rolled one so REDIS_HOST=ghostfolio-redis
# is unchanged.
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: ghostfolio-redis
  namespace: ghostfolio
spec:
  replicas: 1
  args:
    - "--proactor_threads=1"
  authentication:
    passwordFromSecret:
      name: ghostfolio-secrets
      key: REDIS_PASSWORD
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
