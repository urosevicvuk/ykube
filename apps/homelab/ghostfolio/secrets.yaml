# Ghostfolio secrets. Populate in Vault:
#   kv/ghostfolio/secrets:
#     access-token-salt: <openssl rand -hex 16>
#     jwt-secret-key:    <openssl rand -hex 32>
#     redis-password:    <openssl rand -hex 16>
#
# v3 requires REDIS_PASSWORD; the same value is also fed to the redis pod's
# --requirepass arg (see redis.yaml) so both endpoints agree.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghostfolio-secrets
  namespace: ghostfolio
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghostfolio-secrets
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_TOKEN_SALT
      remoteRef:
        key: ghostfolio/secrets
        property: access-token-salt
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: ghostfolio/secrets
        property: jwt-secret-key
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: ghostfolio/secrets
        property: redis-password
