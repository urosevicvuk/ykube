apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostfolio
  namespace: ghostfolio
  labels:
    app.kubernetes.io/name: ghostfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ghostfolio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ghostfolio
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ghostfolio
          image: docker.io/ghostfolio/ghostfolio:3.12.0
          ports:
            - name: http
              containerPort: 3333
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3333"
            - name: NODE_ENV
              value: production
            - name: REDIS_HOST
              value: ghostfolio-redis
            - name: REDIS_PORT
              value: "6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ghostfolio-pg-app
                  key: uri
          envFrom:
            # Provides ACCESS_TOKEN_SALT, JWT_SECRET_KEY, REDIS_PASSWORD —
            # all required by Ghostfolio v3.
            - secretRef:
                name: ghostfolio-secrets
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ghostfolio
  namespace: ghostfolio
  labels:
    app.kubernetes.io/name: ghostfolio
spec:
  selector:
    app.kubernetes.io/name: ghostfolio
  ports:
    - name: http
      port: 3333
      targetPort: http
