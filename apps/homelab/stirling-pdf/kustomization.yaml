apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: stirling-pdf

resources:
  - namespace.yaml
  # Tenant guardrails disabled while we stabilize.
  # - resource-quota.yaml
  # - limit-range.yaml
  # - network-policy.yaml
  - httproute.yaml

helmCharts:
  - name: stirling-pdf-chart
    repo: https://stirling-tools.github.io/Stirling-PDF-chart
    version: 3.1.0  # renovate: depName=stirling-tools/stirling-pdf-chart
    releaseName: stirling-pdf
    namespace: stirling-pdf
    valuesFile: values.yaml
    includeCRDs: true
