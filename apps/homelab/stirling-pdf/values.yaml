# The chart concatenates `${registry}/${repository}:${tag}` and `registry`
# defaults to `docker.stirlingpdf.com`. Don't repeat it in `repository:` or
# the rendered image becomes
#   docker.stirlingpdf.com/docker.stirlingpdf.com/stirlingtools/stirling-pdf
# which 404s with `failed to resolve reference`.
image:
  repository: stirlingtools/stirling-pdf
  tag: latest-fat

replicaCount: 1

# NOTE: chart key is `envs:` (plural) AND it must be a LIST of {name, value}
# entries — the template renders `toYaml .Values.envs | indent 8` straight
# into the `env:` array, not as a map. A map silently does nothing.
#
# JAVA_OPTS: Stirling's internal ResourceMonitor watches cgroup memory and
# treats normal JVM startup allocation as "CRITICAL", killing the Spring
# context. Explicit -Xms/-Xmx keeps the JVM heap predictable so it doesn't
# grow against the cgroup ceiling at boot.
envs:
  - name: SECURITY_ENABLELOGIN
    value: "false"
  - name: JAVA_OPTS
    value: "-Xms256m -Xmx2g"

persistence:
  enabled: false

# Probes get long initial delays because Stirling boots its full Java + libreoffice
# toolchain on first hit and can take 30-60s on a homelab box.
livenessProbe:
  initialDelaySeconds: 60
readinessProbe:
  initialDelaySeconds: 60

# Give Java explicit heap (above) and the cgroup enough overhead so the
# ResourceMonitor doesn't trip. 1Gi requested, 4Gi ceiling. Empty resources:
# {} did not work — SSA preserved the previously-applied limits.
resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
