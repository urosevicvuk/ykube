# The chart concatenates `${registry}/${repository}:${tag}` and `registry`
# defaults to `docker.stirlingpdf.com`. Don't repeat it in `repository:` or
# the rendered image becomes
#   docker.stirlingpdf.com/docker.stirlingpdf.com/stirlingtools/stirling-pdf
# which 404s with `failed to resolve reference`.
image:
  repository: stirlingtools/stirling-pdf
  tag: latest-fat

replicaCount: 1

env:
  SECURITY_ENABLELOGIN: "false"
  # Stirling-pdf's internal ResourceMonitor watches cgroup memory and treats
  # JVM startup allocation as "CRITICAL", killing the Spring context before
  # it finishes initializing. The fix is twofold: give the JVM enough heap
  # headroom (Xmx) so Java doesn't have to grow against the cgroup ceiling,
  # AND ensure the cgroup limit is high enough that even with Xmx headroom
  # there's room for native-mem (LibreOffice/Python tools etc.).
  JAVA_OPTS: "-Xms256m -Xmx2g"

persistence:
  enabled: false

# Probes get long initial delays because Stirling boots its full Java + libreoffice
# toolchain on first hit and can take 30-60s on a homelab box.
livenessProbe:
  initialDelaySeconds: 60
readinessProbe:
  initialDelaySeconds: 60

# Give Java explicit heap (above) and the cgroup enough overhead so the
# ResourceMonitor doesn't trip. 1Gi requested, 4Gi ceiling. Empty resources:
# {} did not work — SSA preserved the previously-applied limits.
resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
