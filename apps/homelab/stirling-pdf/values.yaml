# The chart concatenates `${registry}/${repository}:${tag}` and `registry`
# defaults to `docker.stirlingpdf.com`. Don't repeat it in `repository:` or
# the rendered image becomes
#   docker.stirlingpdf.com/docker.stirlingpdf.com/stirlingtools/stirling-pdf
# which 404s with `failed to resolve reference`.
image:
  repository: stirlingtools/stirling-pdf
  tag: latest-fat

replicaCount: 1

env:
  SECURITY_ENABLELOGIN: "false"

persistence:
  enabled: false

# Probes get long initial delays because Stirling boots its full Java + libreoffice
# toolchain on first hit and can take 30-60s on a homelab box.
livenessProbe:
  initialDelaySeconds: 60
readinessProbe:
  initialDelaySeconds: 60

# Cgroup-bounded resources crash Stirling on startup: its internal
# ResourceMonitor reads cgroup memory at JVM init, sees the bounded ceiling,
# treats normal startup-time allocation as "CRITICAL", and shuts down before
# the Spring context finishes loading
# (TempFileShutdownHook BeanCreationException). Unset limits = container can
# use whatever the node has free, monitor reads node-level memory and stays
# OK. We'll re-add limits per-app once the node has a sustained baseline.
resources: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
