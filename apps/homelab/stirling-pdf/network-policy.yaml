# Default-deny + explicit-allow for the stirling-pdf namespace.
# No internet egress needed at runtime — PDF processing is fully offline.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tenant-baseline
  namespace: stirling-pdf
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": stirling-pdf
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": gateway
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-prometheus-stack
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": stirling-pdf
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
