apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-oidc-secrets
  namespace: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authelia-oidc-secrets
  data:
    - secretKey: oidc-private-key
      remoteRef:
        key: secret/authelia/oidc
        property: private-key
    - secretKey: argocd-client-secret
      remoteRef:
        key: secret/authelia/oidc/clients
        property: argocd-secret
    - secretKey: grafana-client-secret
      remoteRef:
        key: secret/authelia/oidc/clients
        property: grafana-secret
