apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: grafana
spec:
  config:
    server:
      root_url: https://dashboard.urosevicvuk.dev
    auth.generic_oauth:
      enabled: "true"
      name: Authelia
      allow_sign_up: "true"
      client_id: grafana
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid email profile groups
      auth_url: https://auth.urosevicvuk.dev/api/oidc/authorization
      token_url: https://auth.urosevicvuk.dev/api/oidc/token
      api_url: https://auth.urosevicvuk.dev/api/oidc/userinfo
      role_attribute_path: "contains(groups[*], 'admins') && 'Admin' || 'Viewer'"
    auth:
      oauth_auto_login: "true"
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              envFrom:
                - secretRef:
                    name: grafana-oidc-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-data
  service:
    metadata:
      labels:
        app: grafana
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          targetPort: 3000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-oidc-secret
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: secret/authelia/oidc/clients
        property: grafana-secret
