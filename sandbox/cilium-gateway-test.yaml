# Cilium Gateway API sandbox test for #42325 (same-node return traffic).
#
# Apply with:
#   kubectl apply -f sandbox/cilium-gateway-test.yaml
#
# What this provisions:
#   - Namespace `cilium-gw-test`
#   - jmalloc/echo-server Deployment (echoes request details — useful for
#     confirming the request actually reached the pod)
#   - Service in front of it
#   - A Gateway using `gatewayClassName: cilium`. No tls, plain HTTP on
#     port 80 so we don't entangle cert-manager in this test. Gets its
#     own LB IP from the lan pool (.2-.9).
#   - HTTPRoute mapping `/` → echo Service.
#   - A `curl` Pod scheduled to the same node (firelink — single node
#     cluster, so this is automatic) that we'll exec into for testing.
#
# After it's up:
#
#   # 1. Discover the gateway's LB IP (may take ~30s after apply):
#   kubectl get gateway -n cilium-gw-test cilium-test-gateway \
#     -o jsonpath='{.status.addresses[0].value}{"\n"}'
#
#   # 2. Same-node curl test (the actual #42325 reproducer):
#   kubectl exec -n cilium-gw-test deploy/curl -- \
#     curl -sS --max-time 10 http://<LB_IP>/ | head
#
#   Expected if working: echo-server prints request details.
#   Expected if #42325 bites us: `curl: (28) Operation timed out`.
#
#   # 3. Also test via Service ClusterIP (sanity check the workload pod itself
#   # works — if this fails too, it's not Gateway-related):
#   kubectl exec -n cilium-gw-test deploy/curl -- \
#     curl -sS --max-time 5 http://echo/ | head
#
#   # 4. Hubble flow check (see what eBPF datapath did with the request):
#   #   cilium hubble observe --namespace cilium-gw-test --last 50 \
#   #     --type drop --type policy-verdict
#
# Cleanup (whether it worked or not):
#   kubectl delete -f sandbox/cilium-gateway-test.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-gw-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: cilium-gw-test
spec:
  replicas: 1
  selector:
    matchLabels: { app: echo }
  template:
    metadata:
      labels: { app: echo }
    spec:
      containers:
        - name: echo
          image: ghcr.io/jmalloc/echo-server:0.3.7
          ports:
            - containerPort: 8080
              name: http
          env:
            - { name: PORT, value: "8080" }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: cilium-gw-test
spec:
  selector: { app: echo }
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
# Tiny pod with curl that we exec into for the test. Scheduled to the
# same node as the echo pod (trivial on a single-node cluster).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl
  namespace: cilium-gw-test
spec:
  replicas: 1
  selector:
    matchLabels: { app: curl }
  template:
    metadata:
      labels: { app: curl }
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.10.1
          command: ["sleep", "infinity"]
          resources:
            requests: { cpu: 10m, memory: 8Mi }
            limits: { memory: 32Mi }
---
# Plain HTTP gateway using the Cilium-provided GatewayClass.
# `gatewayClassName: cilium` is auto-created by the cilium-operator when
# gatewayAPI.enabled: true lands in the helm values.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-test-gateway
  namespace: cilium-gw-test
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: cilium-gw-test
spec:
  parentRefs:
    - name: cilium-test-gateway
      group: gateway.networking.k8s.io
      kind: Gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo
          port: 80
          group: ""
          kind: Service
          weight: 1
