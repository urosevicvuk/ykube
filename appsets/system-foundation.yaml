# Foundation: services every other pod uses at runtime.
# external-secrets (Secrets backend), longhorn (storage class),
# vault (secrets store — chart-deployed; init+unseal happens out-of-band
# in TF stage 06), kyverno (admission webhook).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: system-foundation
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/urosevicvuk/ykube
        revision: main
        directories:
          - path: apps/system/foundation/*
  template:
    metadata:
      name: 'foundation-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-100"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: system
      source:
        repoURL: https://github.com/urosevicvuk/ykube
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
