apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: raf
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/urosevicvuk/ykube
        revision: main
        directories:
          - path: apps/raf/*
  template:
    metadata:
      name: 'raf-{{path.basename}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: raf
      source:
        repoURL: https://github.com/urosevicvuk/ykube
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        # raf AppProject allows `raf` and `raf-*` namespaces. Convention:
        # dir apps/raf/<name>/ → Application raf-<name> in namespace raf-<name>.
        namespace: 'raf-{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          # Apps own their Namespace resource.
          - ServerSideApply=true
          - PruneLast=true
