# Argocd self-takeover, deliberately at the latest wave so that:
#  - on a first bootstrap, the cluster is fully converged before we touch the
#    controller (which is seed-installed by TF stage 05);
#  - on a chart upgrade, all other apps reconcile under the OLD argocd version
#    first, then argocd upgrades itself last — bad bumps don't strand the rest
#    of the cluster mid-sync.
#
# Single-app AppSet using a `list` generator so the Application name is just
# `argocd` (not `argocd-argocd` from a directory generator).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: system-argocd
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: argocd
            path: apps/system/argocd
  template:
    metadata:
      name: '{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "100"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: system
      source:
        repoURL: https://github.com/urosevicvuk/ykube
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
