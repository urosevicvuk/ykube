# AppSet for RAF tenant apps whose manifests live in *other* git repos
# (typically owned by the RAF-SI-2025 GitHub org). One list entry per app.
#
# Why not the directories generator from appsets/raf.yaml? That one assumes
# the Application's source is ykube and discovers apps by scanning apps/raf/*.
# External-source apps need Argo to watch their *own* repo so commits there
# trigger refreshes (and so a webhook on that repo actually works); the
# Application's repoURL has to be the external one, not ykube.
#
# When/why to add an entry: a new RAF project lands with its manifests
# owned by the school team in a separate repo. Pin targetRevision to a
# release tag (not a branch) so bumps are explicit gitops events in ykube.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: raf-external
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: banka
            repoURL: https://github.com/RAF-SI-2025/Banka-3-Infrastructure
            targetRevision: v0.6.7
            path: .
  template:
    metadata:
      name: 'raf-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: raf
      source:
        repoURL: '{{repoURL}}'
        targetRevision: '{{targetRevision}}'
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        # Convention: name banka → namespace raf-banka.
        namespace: 'raf-{{name}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - PruneLast=true
