# Platform: shared services workloads consume.
# cloudnative-pg (postgres operator), harbor (registry), forgejo (SCM),
# argo-workflows + argo-events (workflow engine).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: system-platform
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/urosevicvuk/ykube
        revision: main
        directories:
          - path: apps/system/platform/*
  template:
    metadata:
      name: 'platform-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-40"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: system
      source:
        repoURL: https://github.com/urosevicvuk/ykube
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PruneLast=true
