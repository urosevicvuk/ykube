---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: system-ingress
data:
  config.yaml: |
    # Cloudflare Tunnel Configuration
    # This file defines the routing rules for the tunnel

    # Tunnel ID
    tunnel: 67f9c7d3-6182-4f5b-946c-c5c676edd958
    credentials-file: /etc/cloudflared/credentials.json

    # Metrics endpoint for monitoring
    metrics: 0.0.0.0:2000

    # Ingress rules - order matters!
    ingress:
      # Nextcloud
      - hostname: cloud.urosevicvuk.dev
        service: https://traefik.system-ingress:443
        originRequest:
          originServerName: cloud.urosevicvuk.dev
          noTLSVerify: false
          connectTimeout: 30s
          tlsTimeout: 10s

      # Excalidraw
      - hostname: draw.urosevicvuk.dev
        service: https://traefik.system-ingress:443
        originRequest:
          originServerName: draw.urosevicvuk.dev
          noTLSVerify: false
          connectTimeout: 30s
          tlsTimeout: 10s

      # GitLab
      - hostname: git.urosevicvuk.dev
        service: https://traefik.system-ingress:443
        originRequest:
          originServerName: git.urosevicvuk.dev
          noTLSVerify: false
          connectTimeout: 30s
          tlsTimeout: 10s

      # GitLab Registry
      - hostname: registry.urosevicvuk.dev
        service: https://traefik.system-ingress:443
        originRequest:
          originServerName: registry.urosevicvuk.dev
          noTLSVerify: false
          connectTimeout: 30s
          tlsTimeout: 10s

      # Sterling PDF
      - hostname: pdf.urosevicvuk.dev
        service: https://traefik.system-ingress:443
        originRequest:
          originServerName: pdf.urosevicvuk.dev
          noTLSVerify: false
          connectTimeout: 30s
          tlsTimeout: 10s

      # OpenProject
      - hostname: openproject.raf-project.com
        service: https://traefik.system-ingress:443
        originRequest:
          originServerName: openproject.raf-project.com
          noTLSVerify: false
          connectTimeout: 30s
          tlsTimeout: 10s

      # Catch-all rule (required by cloudflared)
      - service: http_status:404
