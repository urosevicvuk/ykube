# task -d seed-talos/ <task-name>
#
# Talos+Proxmox bootstrap pipeline. For the k3s/firelink cluster see seed-k3s/.
# All commands assume INFRA_ROOT is set — the dev shell (flake.nix) does this.
# (The env var name still says "INFRA" for historical reasons; it points at seed-talos/.)
# If running outside the shell:
#   export INFRA_ROOT="$(pwd)"

version: "3"
run: once

tasks:
  default:
    desc: List all tasks
    cmds:
      - task --list

  # ============================================================
  # Per-stage tasks
  # ============================================================

  factory:install:
    desc: 00 — register the Talos schematic with factory.talos.dev
    dir: '{{.TASKFILE_DIR}}/00-talos-factory'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  factory:destroy:
    desc: 00 — destroy the schematic registration (rare; only if changing extensions)
    dir: '{{.TASKFILE_DIR}}/00-talos-factory'
    cmds:
      - tofu destroy -var-file=../shared/secrets.auto.tfvars -auto-approve

  iso:upload:
    desc: 01 — download the factory ISO to each Proxmox node's local storage
    dir: '{{.TASKFILE_DIR}}/01-proxmox-iso-upload'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  iso:destroy:
    desc: 01 — remove the ISO from Proxmox
    dir: '{{.TASKFILE_DIR}}/01-proxmox-iso-upload'
    cmds:
      - tofu destroy -var-file=../shared/secrets.auto.tfvars -auto-approve

  vms:provision:
    desc: 02 — create Talos VMs on Proxmox
    dir: '{{.TASKFILE_DIR}}/02-proxmox-provision'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  vms:destroy:
    desc: 02 — destroy the VMs (DESTRUCTIVE)
    dir: '{{.TASKFILE_DIR}}/02-proxmox-provision'
    cmds:
      - tofu destroy -var-file=../shared/secrets.auto.tfvars -auto-approve

  talos:configure:
    desc: 03 — apply machine configs, bootstrap etcd, retrieve kubeconfig
    dir: '{{.TASKFILE_DIR}}/03-talos-configure'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  talos:destroy:
    desc: 03 — reset Talos nodes back to maintenance mode (DESTRUCTIVE)
    dir: '{{.TASKFILE_DIR}}/03-talos-configure'
    cmds:
      - tofu destroy -var-file=../shared/secrets.auto.tfvars -auto-approve

  cilium:install:
    desc: 04 — seed-install Cilium CNI
    dir: '{{.TASKFILE_DIR}}/04-cilium'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  cilium:destroy:
    desc: 04 — remove Cilium (cluster networking will break)
    dir: '{{.TASKFILE_DIR}}/04-cilium'
    cmds:
      - tofu destroy -var-file=../shared/secrets.auto.tfvars -auto-approve

  argocd:install:
    desc: 05 — seed-install ArgoCD and apply root/app-of-apps.yaml
    dir: '{{.TASKFILE_DIR}}/05-argocd'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  argocd:destroy:
    desc: 05 — remove ArgoCD (orphans every Application)
    dir: '{{.TASKFILE_DIR}}/05-argocd'
    cmds:
      - tofu destroy -var-file=../shared/secrets.auto.tfvars -auto-approve

  vault:init:
    desc: 06 — initialise + unseal Vault, configure k8s auth + ESO role
    dir: '{{.TASKFILE_DIR}}/06-vault-init'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  vault:secrets:
    desc: 07 — write bootstrap secrets to Vault (cloudflare-api-token, etc.)
    dir: '{{.TASKFILE_DIR}}/07-vault-resources-provision'
    cmds:
      - tofu init
      - tofu apply -var-file=../shared/secrets.auto.tfvars -auto-approve

  vault:status:
    desc: Show vault status across all replicas (use after node reboots)
    cmds:
      - bash {{.TASKFILE_DIR}}/scripts/vault-status.sh

  vault:unseal:
    desc: Re-run the unseal pass (after node reboots / pod rescheduling)
    cmds:
      - bash {{.TASKFILE_DIR}}/scripts/vault-bootstrap.sh

  # ============================================================
  # Composite
  # ============================================================

  cluster:bootstrap:
    desc: Run stages 00 → 07 in order. Fresh-cluster path.
    cmds:
      - task: factory:install
      - task: iso:upload
      - task: vms:provision
      - task: talos:configure
      - task: cilium:install
      - task: argocd:install
      - task: vault:init
      - task: vault:secrets

  # ============================================================
  # Cleanup
  # ============================================================
  # Destroy in reverse order. Stops at stage 02 — past that, talos:destroy
  # would force a node reset (we keep that manual to avoid accidents).

  cluster:destroy:
    desc: Destroy VMs + ISOs (does NOT touch state in 03+; run task talos:destroy first if you want a full nuke)
    cmds:
      - task: vms:destroy
      - task: iso:destroy

  clean:states:
    desc: Remove all tfstate. DANGEROUS — only use after cluster:destroy.
    cmds:
      - rm -rf '{{.TASKFILE_DIR}}/states/'*
