global:
  edition: ce

  hosts:
    domain: urosevicvuk.dev
    https: true
    gitlab:
      name: git.urosevicvuk.dev
    registry:
      name: registry.urosevicvuk.dev

  ingress:
    enabled: false
    configureCertmanager: false

  psql:
    host: gitlab-pg-rw.gitlab
    port: 5432
    database: gitlabhq_production
    username: gitlab
    password:
      useSecret: true
      secret: gitlab-db-credentials
      key: password

  redis:
    host: gitlab-redis
    port: 6379
    auth:
      enabled: false

  time_zone: UTC

  minio:
    enabled: true

  appConfig:
    enableUsagePing: false

installCertmanager: false

nginx-ingress:
  enabled: false

postgresql:
  install: false

redis:
  install: false

prometheus:
  install: false

minio:
  persistence:
    storageClass: longhorn
    size: 10Gi

registry:
  enabled: true
  ingress:
    enabled: false

upgradeCheck:
  enabled: false

gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  sidekiq:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

  gitaly:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  gitlab-shell:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  toolbox:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  migrations:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  kas:
    enabled: false

  grafana:
    enabled: false

gitlab-runner:
  gitlabUrl: http://gitlab-webservice-default.gitlab:8181
