configs:
  params:
    server.insecure: true
  cm:
    url: https://argocd.urosevicvuk.dev
    oidc.config: |
      name: Authelia
      issuer: https://auth.urosevicvuk.dev
      clientID: argocd
      clientSecret: $argocd-oidc-secret:oidc.clientSecret
      requestedScopes:
        - openid
        - groups
        - email
        - profile
  rbac:
    policy.csv: |
      g, admins, role:admin

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
