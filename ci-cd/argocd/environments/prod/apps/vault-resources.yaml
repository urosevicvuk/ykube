apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-700"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/urosevicvuk/ykube.git
    targetRevision: HEAD
    path: security/vault/environments/prod
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
