kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 6443

gatewayAPI:
  enabled: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true

l2announcements:
  enabled: true

externalIPs:
  enabled: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

ipam:
  mode: kubernetes

operator:
  replicas: 1

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
